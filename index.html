<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>вљЅ Coughlans World Cup 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a1628; color: #e8edf5; min-height: 100vh; }

/* в”Ђв”Ђ HEADER в”Ђв”Ђ */
header { background: linear-gradient(135deg, #0d2b1a, #0a1f30); padding: 12px 16px; border-bottom: 2px solid #27ae60; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 1.05rem; font-weight: 700; }
.header-right { text-align: right; }
#live-label { font-size: 0.68rem; color: #7a9ab0; }
#last-updated { font-size: 0.65rem; color: #7a9ab0; margin-top: 2px; }
.live-pill { display: inline-block; background: #c0392b; color: #fff; font-size: 0.58rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.5px; margin-left: 4px; animation: blink 1s infinite; vertical-align: middle; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* в”Ђв”Ђ BANNERS в”Ђв”Ђ */
#inapp-banner { display: none; background: #1a2a3a; padding: 6px 14px; font-size: .72rem; color: #7a9ab0; border-bottom: 1px solid #1a3050; text-align: center; }
#inapp-banner strong { color: #e8edf5; }
#next-banner { display: none; background: #0d2035; border-bottom: 1px solid #1a3050; padding: 7px 14px; font-size: 0.75rem; color: #7a9ab0; }
#next-banner strong { color: #e8edf5; }

/* в”Ђв”Ђ STATS BAR в”Ђв”Ђ */
.stats-bar { display: flex; background: #0d1f35; border-bottom: 1px solid #1a3050; }
.stat { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 7px 4px; border-right: 1px solid #1a3050; transition: background .15s; }
.stat:last-child { border-right: none; }
.stat.clickable { cursor: pointer; }
.stat.clickable:hover { background: rgba(255,255,255,.06); }
.stat.filter-active { background: rgba(39,174,96,.1); border-top: 2px solid #27ae60; }
.stat-num { font-size: 1.05rem; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: 0.58rem; color: #7a9ab0; margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
.c-in{color:#27ae60} .c-tbd{color:#f39c12} .c-out{color:#e74c3c} .c-all{color:#7a9ab0}

/* в”Ђв”Ђ SEARCH в”Ђв”Ђ */
.search-wrap { position: relative; padding: 8px 14px; background: #0d1f35; border-bottom: 1px solid #1a3050; }
#search-input { width: 100%; background: #081422; border: 1px solid #1a3050; border-radius: 8px; padding: 7px 34px 7px 12px; color: #e8edf5; font-size: 0.82rem; outline: none; }
#search-input:focus { border-color: #27ae60; }
#search-clear { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #7a9ab0; font-size: 1rem; cursor: pointer; padding: 0 4px; display: none; line-height: 1; }
#search-clear:hover { color: #e8edf5; }

/* в”Ђв”Ђ TABS в”Ђв”Ђ */
.tab-bar { display: flex; background: #0a1628; border-bottom: 2px solid #1a3050; position: sticky; top: 48px; z-index: 99; }
.tab-btn { flex: 1; background: none; border: none; cursor: pointer; padding: 10px 4px; font-size: 0.76rem; color: #7a9ab0; font-family: inherit; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .15s, border-color .15s; white-space: nowrap; }
.tab-btn.active { color: #27ae60; border-bottom-color: #27ae60; }
.tab-btn:hover:not(.active) { color: #b0c4d8; }

/* в”Ђв”Ђ SECTION HEADERS в”Ђв”Ђ */
.sec-hdr { padding: 6px 14px; font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #7a9ab0; background: #0d1f35; border-bottom: 1px solid #1a3050; border-top: 1px solid #1a3050; margin-top: 6px; }
.sec-hdr:first-child { margin-top: 0; }
.allteams-hdr { padding: 10px 14px 6px; font-size: .8rem; color: #7a9ab0; border-bottom: 1px solid #1a3050; background: #0d1f35; }
.allteams-hdr span { color: #27ae60; font-weight: 700; }

/* в”Ђв”Ђ LEADERBOARD ROW в”Ђв”Ђ */
.lb-row { display: grid; grid-template-columns: 28px 32px 1fr auto; gap: 8px; align-items: center; padding: 9px 14px; border-bottom: 1px solid #111e30; cursor: pointer; transition: background .15s; }
.lb-row:hover { background: rgba(255,255,255,.04); }
.lb-row.eliminated { opacity: .38; }
.lb-rank { font-size: 0.9rem; font-weight: 800; color: #7a9ab0; text-align: center; }
.lb-rank.gold{color:#f1c40f} .lb-rank.silver{color:#bdc3c7} .lb-rank.bronze{color:#cd7f32}
.lb-flag { font-size: 1.45rem; text-align: center; line-height: 1; }
.lb-info { min-width: 0; }
.lb-name { font-size: 0.92rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-team { font-size: 0.7rem; color: #7a9ab0; margin-top: 1px; }
.pts-badge { font-size: 0.72rem; font-weight: 700; padding: 4px 8px; border-radius: 10px; white-space: nowrap; min-width: 52px; text-align: center; }
.pts-0{background:#111e30;color:#4a6a80;border:1px solid #1a3050}
.pts-1{background:#0d2035;color:#3b8fd4;border:1px solid #2a6fa8}
.pts-2,.pts-3{background:#0d2a1a;color:#27ae60;border:1px solid #27ae60}
.pts-4,.pts-5{background:#1a2a0a;color:#8bc34a;border:1px solid #6a9a2a}
.pts-6{background:#2a1f00;color:#f39c12;border:1px solid #b57206}
.pts-7{background:#3a2800;color:#ffc107;border:1px solid #ffc107}

/* в”Ђв”Ђ TEAM ROW в”Ђв”Ђ */
.team-row { display: grid; grid-template-columns: 36px 1fr auto 18px; gap: 10px; align-items: center; padding: 9px 14px; border-bottom: 1px solid #111e30; cursor: pointer; transition: background .15s; }
.team-row:hover { background: rgba(255,255,255,.04); }
.team-row.eliminated { opacity: .38; }
.team-flag { font-size: 1.5rem; text-align: center; line-height: 1; }
.team-info { min-width: 0; }
.team-name { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-people { font-size: .7rem; color: #7a9ab0; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chev { color: #4a6a80; font-size: .7rem; transition: transform .2s; }
.chev.open { transform: rotate(90deg); }

/* в”Ђв”Ђ EXPAND в”Ђв”Ђ */
.expand { display: none; background: #081422; border-bottom: 1px solid #1a3050; padding: 10px 14px 12px 60px; }
.expand.open { display: block; }
.ex-match { display: flex; gap: 8px; font-size: .73rem; padding: 3px 0; color: #b0c4d8; align-items: center; }
.ex-date { color: #4a6a80; min-width: 52px; }
.ex-vs { flex: 1; }
.ex-score { font-weight: 700; min-width: 36px; text-align: right; }
.ex-icon { min-width: 18px; text-align: right; }
.ex-btn { display: block; margin-top: 10px; width: 100%; background: #0d2a1a; border: 1px solid #27ae60; color: #27ae60; padding: 8px 12px; border-radius: 8px; font-size: .8rem; font-weight: 700; cursor: pointer; font-family: inherit; text-align: center; transition: background .15s; }
.ex-btn:hover { background: #1a4a2a; }

/* в”Ђв”Ђ ALL TEAMS VIEW в”Ђв”Ђ */
.at-row { display: grid; grid-template-columns: 36px 1fr auto; gap: 10px; align-items: center; padding: 10px 14px; border-bottom: 1px solid #111e30; cursor: pointer; transition: background .15s; }
.at-row:hover { background: rgba(255,255,255,.04); }
.at-row.eliminated { opacity: .38; }
.at-flag { font-size: 1.5rem; text-align: center; line-height: 1; }
.at-info { min-width: 0; }
.at-name { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.at-colleagues { font-size: .68rem; color: #7a9ab0; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.at-scorers { font-size: .68rem; color: #f39c12; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* в”Ђв”Ђ CLASHES в”Ђв”Ђ */
.clash-card { margin: 10px 14px; border-radius: 10px; border: 1px solid #1a3050; overflow: hidden; }
.clash-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: #0d1f35; padding: 10px 14px; gap: 8px; }
.clash-team { display: flex; flex-direction: column; }
.clash-team.right { align-items: flex-end; text-align: right; }
.clash-flag { font-size: 1.4rem; line-height: 1; }
.clash-name { font-size: .82rem; font-weight: 700; margin-top: 2px; }
.clash-score-box { text-align: center; }
.clash-score { font-size: 1.3rem; font-weight: 800; line-height: 1; }
.clash-score.live { color: #e74c3c; }
.clash-date { font-size: .65rem; color: #7a9ab0; margin-top: 2px; white-space: nowrap; }
.clash-body { padding: 8px 14px; background: #081422; }
.clash-people { display: flex; }
.clash-col { flex: 1; font-size: .7rem; color: #7a9ab0; line-height: 1.8; }
.clash-col.right { text-align: right; }
.clash-result { text-align: center; font-size: .7rem; margin-top: 6px; }
.clash-result.won { color: #27ae60; font-weight: 700; }
.clash-stage { font-size: .67rem; color: #4a6a80; text-align: center; margin-top: 4px; letter-spacing: .5px; text-transform: uppercase; }

/* в”Ђв”Ђ BADGES в”Ђв”Ђ */
.badge { font-size: .65rem; font-weight: 700; padding: 3px 7px; border-radius: 10px; white-space: nowrap; min-width: 72px; text-align: center; letter-spacing: .2px; }
.b-champion{background:#856404;color:#ffc107;border:1px solid #ffc107}
.b-in{background:#0d2a1a;color:#27ae60;border:1px solid #27ae60}
.b-group{background:#0d2035;color:#3b8fd4;border:1px solid #2a6fa8}
.b-tbd{background:#2d1f00;color:#f39c12;border:1px solid #b57206}
.b-out{background:#2a0d0d;color:#c0392b;border:1px solid #7a2020}

/* в”Ђв”Ђ MODAL в”Ђв”Ђ */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 300; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: #0d1f35; width: 100%; max-width: 500px; border-radius: 16px 16px 0 0; border-top: 2px solid #27ae60; max-height: 82vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 36px; height: 4px; background: #3a5070; border-radius: 2px; margin: 10px auto 0; }
.modal-hdr { display: flex; align-items: center; gap: 12px; padding: 12px 16px 8px; }
.modal-flag { font-size: 2.2rem; line-height: 1; }
.modal-team-name { font-size: 1.1rem; font-weight: 700; flex: 1; }
.modal-close { background: #1a3050; border: none; color: #7a9ab0; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.modal-close:hover { background: #2a4060; color: #e8edf5; }
.modal-sec { padding: 8px 16px; }
.modal-sec-title { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #7a9ab0; margin-bottom: 7px; }
.divider { height: 1px; background: #1a3050; margin: 4px 0; }

/* Progress Strip */
.progress-strip { display: flex; align-items: flex-start; padding: 4px 0 8px; }
.ps-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.ps-circle { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 700; }
.ps-step.done .ps-circle { background: #27ae60; color: #fff; }
.ps-step.current .ps-circle { background: #27ae60; color: #fff; box-shadow: 0 0 0 4px rgba(39,174,96,.25); }
.ps-step.future .ps-circle { background: #1a3050; color: #4a6a80; border: 1px solid #2a4060; }
.ps-step.eliminated .ps-circle { background: #3a1010; color: #e74c3c; border: 1px solid #7a2020; }
.ps-label { font-size: .58rem; color: #7a9ab0; white-space: nowrap; text-align: center; }
.ps-line { flex: 1; height: 2px; margin-top: 12px; min-width: 10px; }
.ps-line.done{background:#27ae60} .ps-line.future,.ps-line.current{background:#1a3050}

/* Modal stats */
.stats-row { display: flex; margin: 4px 0; }
.stat-box { flex: 1; text-align: center; padding: 8px 4px; background: #081422; border-right: 1px solid #1a3050; }
.stat-box:first-child { border-radius: 6px 0 0 6px; }
.stat-box:last-child { border-right: none; border-radius: 0 6px 6px 0; }
.stat-box-num { font-size: 1.2rem; font-weight: 700; line-height: 1; }
.stat-box-lbl { font-size: .6rem; color: #7a9ab0; margin-top: 2px; }
.pos-num{color:#27ae60} .neg-num{color:#e74c3c}

/* Scorers */
.scorers-table { width: 100%; border-collapse: collapse; font-size: .75rem; }
.scorers-table th { text-align: left; color: #4a6a80; font-weight: 600; padding: 3px 4px; border-bottom: 1px solid #1a3050; }
.scorers-table td { padding: 4px; border-bottom: 1px solid #0d1a28; }
.scorers-table tr:last-child td { border-bottom: none; }
.sc-goals { font-weight: 700; color: #f39c12; text-align: right; }
.sc-assists { color: #7a9ab0; text-align: right; }

/* Modal matches */
.modal-match { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid #0d1a28; font-size: .75rem; align-items: center; }
.modal-match:last-child { border-bottom: none; }
.mm-date { color: #4a6a80; min-width: 52px; font-size: .7rem; }
.mm-vs { flex: 1; }
.mm-score { font-weight: 700; min-width: 36px; text-align: right; }
.mm-icon { min-width: 20px; text-align: right; }
.mm-stage { font-size: .62rem; color: #4a6a80; margin-top: 1px; }
.colleagues-list { font-size: .82rem; color: #c8d8e8; line-height: 1.9; }
.next-fixture { background: #081422; border-radius: 6px; padding: 8px 10px; font-size: .78rem; margin-top: 4px; }
.nf-label { font-size: .62rem; color: #7a9ab0; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }

/* Empty state */
.empty-state { text-align: center; padding: 48px 24px; }
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-title { font-size: .95rem; font-weight: 700; margin-bottom: 8px; }
.empty-sub { font-size: .78rem; color: #7a9ab0; line-height: 1.5; }

#loading { text-align: center; padding: 48px 20px; color: #7a9ab0; font-size: .9rem; }
.spinner { font-size: 2rem; display: block; margin-bottom: 12px; animation: spin 1.5s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
#error-msg { display: none; padding: 14px; margin: 12px; background: #2a0d0d; border: 1px solid #7a2020; border-radius: 6px; color: #e74c3c; font-size: .8rem; }
</style>
</head>
<body>

<header>
  <h1>вљЅ Coughlans World Cup 2026</h1>
  <div class="header-right">
    <div id="live-label">Auto-updating</div>
    <div id="last-updated">LoadingвЂ¦</div>
  </div>
</header>

<div id="inapp-banner">Tap <strong>в‹® в†’ Open in browser</strong> for best experience &amp; to bookmark</div>
<div id="next-banner"></div>

<div class="stats-bar">
  <div class="stat clickable" id="stat-all" onclick="showAllTeams()">
    <span class="stat-num c-all" id="sn-all">вЂ”</span><span class="stat-lbl">Teams</span>
  </div>
  <div class="stat clickable" id="stat-in" onclick="toggleFilter('in')">
    <span class="stat-num c-in" id="sn-in">вЂ”</span><span class="stat-lbl">In</span>
  </div>
  <div class="stat clickable" id="stat-tbd" onclick="toggleFilter('tbd')">
    <span class="stat-num c-tbd" id="sn-tbd">вЂ”</span><span class="stat-lbl">TBD</span>
  </div>
  <div class="stat clickable" id="stat-out" onclick="toggleFilter('out')">
    <span class="stat-num c-out" id="sn-out">вЂ”</span><span class="stat-lbl">Out</span>
  </div>
</div>

<div class="search-wrap">
  <input id="search-input" type="search" placeholder="рџ”Ќ Search names or teamsвЂ¦"
    oninput="onSearch(this.value)" onsearch="onSearch(this.value)">
  <button id="search-clear" onclick="clearSearch()" title="Clear">вњ•</button>
</div>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('leaderboard')">рџЏ† Leaderboard</button>
  <button class="tab-btn"        onclick="switchTab('teamstats')">рџ“Љ Team Stats</button>
  <button class="tab-btn"        onclick="switchTab('clashes')">вљ”пёЏ Clashes</button>
</nav>

<div id="error-msg"></div>
<div id="content"><div id="loading"><span class="spinner">вљЅ</span>Fetching match dataвЂ¦</div></div>

<!-- TEAM MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div class="modal-flag" id="m-flag"></div>
      <div>
        <div class="modal-team-name" id="m-name"></div>
        <div id="m-status-badge" style="margin-top:4px"></div>
      </div>
      <button class="modal-close" onclick="closeModalForce()">вњ•</button>
    </div>
    <div class="modal-sec">
      <div class="modal-sec-title">Tournament Progress</div>
      <div class="progress-strip" id="m-progress"></div>
    </div>
    <div class="divider"></div>
    <div class="modal-sec">
      <div class="modal-sec-title">Match Stats</div>
      <div class="stats-row" id="m-stats"></div>
    </div>
    <div class="divider"></div>
    <div class="modal-sec" id="m-scorers-sec" style="display:none">
      <div class="modal-sec-title">Tournament Scorers</div>
      <table class="scorers-table" id="m-scorers-table"></table>
    </div>
    <div class="divider" id="m-scorers-div" style="display:none"></div>
    <div class="modal-sec" id="m-next-sec" style="display:none">
      <div class="modal-sec-title">Next Fixture</div>
      <div class="next-fixture" id="m-next"></div>
    </div>
    <div class="divider" id="m-next-div" style="display:none"></div>
    <div class="modal-sec">
      <div class="modal-sec-title">All Fixtures &amp; Results</div>
      <div id="m-matches"></div>
    </div>
    <div class="divider"></div>
    <div class="modal-sec" style="padding-bottom:20px">
      <div class="modal-sec-title">Colleagues</div>
      <div class="colleagues-list" id="m-colleagues"></div>
    </div>
  </div>
</div>

<script>
// в”Ђв”Ђ CONFIG в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const USE_JSON   = true;
const DATA_URL   = 'data.json';
const HA_URL     = window.location.origin;
const HA_TOKEN   = 'YOUR_LONG_LIVED_TOKEN_HERE';
const HA_SENSOR  = 'sensor.fixtures';
const REFRESH_MS = USE_JSON ? 5 * 60 * 1000 : 60 * 1000;

// в”Ђв”Ђ IN-APP BROWSER DETECTION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
if (/FBAN|FBAV|Instagram|WhatsApp|Telegram|Line/i.test(navigator.userAgent)) {

// в”Ђв”Ђ PROCESS MATCHES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function processMatches(matches) {
  const groupStats={}, koRecord={}, groupMatchCounts={}, matchesByTeam={};
  for (const m of matches) {
    const h=norm(m.home),a=norm(m.away);
    for (const t of [h,a]) { if(!matchesByTeam[t]) matchesByTeam[t]=[]; matchesByTeam[t].push({...m,_h:h,_a:a}); }
  }
  for (const t in matchesByTeam) matchesByTeam[t].sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));

  for (const m of matches.filter(m=>m.status==='FINISHED')) {
    const h=norm(m.home),a=norm(m.away);
    if (m.stage==='GROUP_STAGE') {
      groupMatchCounts[m.group]=(groupMatchCounts[m.group]||0)+1;
      for (const t of [h,a]) if(!groupStats[t]) groupStats[t]={group:m.group,gp:0,pts:0,gf:0,ga:0};
      groupStats[h].gp++; groupStats[a].gp++;
      groupStats[h].gf+=m.homeScore; groupStats[h].ga+=m.awayScore;
      groupStats[a].gf+=m.awayScore; groupStats[a].ga+=m.homeScore;
      if(m.winner==='HOME_TEAM'){groupStats[h].pts+=3;}
      else if(m.winner==='AWAY_TEAM'){groupStats[a].pts+=3;}
      else{groupStats[h].pts+=1;groupStats[a].pts+=1;}
    } else {
      const winner=m.winner==='HOME_TEAM'?h:a, loser=m.winner==='HOME_TEAM'?a:h;
      if(!koRecord[winner]) koRecord[winner]={}; koRecord[winner].stage=m.stage; koRecord[winner].won=true;
      if(!koRecord[loser])  koRecord[loser]={};  koRecord[loser].stage=m.stage;  koRecord[loser].eliminated=true;
    }
  }

  const byGroup={};
  for (const [t,s] of Object.entries(groupStats)) { if(!byGroup[s.group]) byGroup[s.group]=[]; byGroup[s.group].push({team:t,...s}); }
  const groupRanks={};
  for (const [grp,teams] of Object.entries(byGroup)) {
    const isDone=(groupMatchCounts[grp]||0)>=6;
    teams.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:(b.gf-b.ga)!==(a.gf-a.ga)?(b.gf-b.ga)-(a.gf-a.ga):b.gf-a.gf);
    teams.forEach((t,i)=>{ groupRanks[t.team]={rank:i+1,groupDone:isDone,...t}; });
  }

  const completedGroups=Object.values(groupMatchCounts).filter(c=>c>=6).length;
  const allGroupsDone=completedGroups>=12;
  const bestThird=new Set();
  if (allGroupsDone) {
    const thirds=Object.entries(groupRanks).filter(([,r])=>r.rank===3&&r.groupDone)
      .map(([t,r])=>({team:t,pts:r.pts,gd:r.gf-r.ga,gf:r.gf}));
    thirds.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:b.gd!==a.gd?b.gd-a.gd:b.gf-a.gf);
    thirds.slice(0,8).forEach(t=>bestThird.add(t.team));
  }

  const liveCount=matches.filter(m=>m.status==='IN_PLAY'||m.status==='PAUSED').length;
  return {groupStats,koRecord,groupRanks,bestThird,allGroupsDone,matchesByTeam,liveCount,allMatches:matches};
}

// в”Ђв”Ђ STATUS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function resolveStatus(team,st) {
  const {koRecord,groupRanks,groupStats,bestThird,allGroupsDone}=st;
  const ko=koRecord[team],gr=groupRanks[team],gs=groupStats[team];
  if (ko) {
    const s=ko.stage;
    if(s==='FINAL'){
      if(ko.won)        return {code:'CHAMPION', label:'рџЏ† Champion',  badge:'b-champion'};
      if(ko.eliminated) return {code:'OUT_FINAL',label:'рџҐ€ Runner-Up', badge:'b-out'};
    }
    if(s==='THIRD_PLACE'){
      if(ko.won)        return {code:'OUT_SEMI',label:'рџҐ‰ 3rd Place',  badge:'b-in'};
      if(ko.eliminated) return {code:'OUT_3RD', label:'4th Place',     badge:'b-out'};
    }
    const inM ={LAST_32:'IN_R32',LAST_16:'IN_R16',QUARTER_FINALS:'IN_QUARTER',SEMI_FINALS:'IN_SEMI'};
    const outM={LAST_32:'OUT_R32',LAST_16:'OUT_R16',QUARTER_FINALS:'OUT_QUARTER',SEMI_FINALS:'OUT_SEMI'};
    if(ko.eliminated) return {code:outM[s]||'OUT_GROUP',label:`вќЊ Out вЂ“ ${KO_LONG[s]||s}`,badge:'b-out'};
    if(ko.won)        return {code:inM[s]||'QUALIFIED', label:`вњ… ${KO_SHORT[s]}`,         badge:'b-in'};
  }
  if (gr) {
    if(gr.groupDone){
      if(gr.rank<=2) return {code:'QUALIFIED',label:'вњ… Qualified',    badge:'b-in'};
      if(gr.rank===3){
        if(allGroupsDone){
          if(bestThird.has(team)) return {code:'QUALIFIED',label:'вњ… Best 3rd',   badge:'b-in'};
          else                    return {code:'OUT_GROUP', label:'вќЊ Out вЂ“ Group',badge:'b-out'};
        }
        return {code:'TBD',label:'вЏі Best 3rd?',badge:'b-tbd'};
      }
      return {code:'OUT_GROUP',label:'вќЊ Out вЂ“ Group',badge:'b-out'};
    }
    return {code:'GROUP',label:`вљЅ Group (${gr.gp||0} played)`,badge:'b-group'};
  }
  if(gs?.gp>0) return {code:'GROUP',label:`вљЅ Group (${gs.gp} played)`,badge:'b-group'};
  return {code:'GROUP',label:'вљЅ Group Stage',badge:'b-group'};
}

const fmtTime = u => new Date(u).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
const fmtDT   = u => `${fmtDate(u)}, ${fmtTime(u)} UTC`;

function matchIcon(m,team) {
  if(m.status!=='FINISHED') return m.status==='IN_PLAY'||m.status==='PAUSED'?'рџ”ґ':'рџ“…';
  const won=(m._h===team&&m.winner==='HOME_TEAM')||(m._a===team&&m.winner==='AWAY_TEAM');
  const lost=(m._h===team&&m.winner==='AWAY_TEAM')||(m._a===team&&m.winner==='HOME_TEAM');
  return won?'вњ…':lost?'вќЊ':'рџџ°';
}
function teamScore(m,team) {
  if(m.status!=='FINISHED') return '';

}

  if      (activeTab==='leaderboard') renderLeaderboard(lastState);
  else if (activeTab==='teamstats')   renderTeamStats(lastState);

  else if (activeTab==='allteams')    renderAllTeams(lastState);
}

// в”Ђв”Ђ RENDER: LEADERBOARD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderLeaderboard(st) {
  const isOut=p=>p.status.code.startsWith('OUT_'), isTBD=p=>p.status.code==='TBD';

  let people=SYNDICATE.flatMap(s=>{
    const status=resolveStatus(s.team,st), pts=POINTS[status.code]||0;
    return s.people.map(name=>({name,team:s.team,flag:s.flag,status,pts}));
  });
  people.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:(SORT_ORDER[a.status.code]??99)-(SORT_ORDER[b.status.code]??99));
  let rank=1;
  people.forEach((p,i)=>{ if(i>0&&p.pts<people[i-1].pts) rank=i+1; p.rank=rank; });

  if      (activeFilter==='in')  people=people.filter(p=>!isOut(p)&&!isTBD(p));
  else if (activeFilter==='tbd') people=people.filter(isTBD);
  else if (activeFilter==='out') people=people.filter(isOut);

  const rankCls=r=>r===1?'gold':r===2?'silver':r===3?'bronze':'';
  const rankLbl=r=>r===1?'рџҐ‡':r===2?'рџҐ€':r===3?'рџҐ‰':`#${r}`;

  const active=people.filter(p=>!isOut(p)&&!isTBD(p)), tbd=people.filter(isTBD), out=people.filter(isOut);
  const makeRow=p=>`
    <div class="lb-row${isOut(p)?' eliminated':''}" onclick="showModal('${escQ(p.team)}')">
      <div class="lb-rank ${rankCls(p.rank)}">${rankLbl(p.rank)}</div>
      <div class="lb-flag">${p.flag}</div>
      <div class="lb-info"><div class="lb-name">${p.name}</div><div class="lb-team">${p.team}</div></div>
      <div class="pts-badge pts-${p.pts}">${p.pts} pt${p.pts!==1?'s':''}</div>
    </div>`;

  let html='';
  if(active.length) { html+=`<div class="sec-hdr">рџџў Still In вЂ” ${active.length} people</div>`+active.map(makeRow).join(''); }
  if(tbd.length)    { html+=`<div class="sec-hdr">вЏі Best-Third TBD вЂ” ${tbd.length} people</div>`+tbd.map(makeRow).join(''); }
  if(out.length)    { html+=`<div class="sec-hdr">вќЊ Eliminated вЂ” ${out.length} people</div>`+out.map(makeRow).join(''); }
  if(!html) html=`<div class="empty-state"><div class="empty-icon">рџ”Ќ</div><div class="empty-title">No results</div></div>`;
  document.getElementById('content').innerHTML=html;
}

// в”Ђв”Ђ RENDER: TEAM STATS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderTeamStats(st) {
  const isOut=e=>e.status.code.startsWith('OUT_'), isTBD=e=>e.status.code==='TBD';
  let entries=SYNDICATE.map(s=>({...s,status:resolveStatus(s.team,st)}));
  entries.sort((a,b)=>(SORT_ORDER[a.status.code]??99)-(SORT_ORDER[b.status.code]??99));

  if      (activeFilter==='in')  entries=entries.filter(e=>!isOut(e)&&!isTBD(e));
  else if (activeFilter==='tbd') entries=entries.filter(isTBD);
  else if (activeFilter==='out') entries=entries.filter(isOut);

  const makeRow=e=>{
    const tid='ex_'+e.team.replace(/[^a-z0-9]/gi,'_');
    const ms=(st.matchesByTeam[e.team]||[]).filter(m=>m.status==='FINISHED');
    const recent=ms.slice(-2).map(m=>`
      <div class="ex-match">
        <span class="ex-date">${fmtDate(m.utcDate)}</span>
        <span class="ex-vs">vs ${m._h===e.team?m._a:m._h}</span>
        <span class="ex-score">${teamScore(m,e.team)}</span>
        <span class="ex-icon">${matchIcon(m,e.team)}</span>
      </div>`).join('');
    return `
      <div class="team-row${isOut(e)?' eliminated':''}" onclick="toggleExpand('${tid}')">
        <div class="team-flag">${e.flag}</div>
        <div class="team-info"><div class="team-name">${e.team}</div><div class="team-people">${e.people.join(' В· ')}</div></div>
        <div class="badge ${e.status.badge}">${e.status.label}</div>
        <div class="chev" id="chev_${tid}">вЂє</div>
      </div>
      <div class="expand" id="${tid}">
        ${recent||'<div class="ex-match" style="color:#4a6a80">No results yet</div>'}
        <button class="ex-btn" onclick="event.stopPropagation();showModal('${escQ(e.team)}')">рџ“Љ Full Stats, Scorers &amp; All Fixtures</button>
      </div>`;
  };

  const inL=entries.filter(e=>!isOut(e)&&!isTBD(e)), tbdL=entries.filter(isTBD), outL=entries.filter(isOut);
  let html='';
  if(inL.length)  html+=`<div class="sec-hdr">рџџў Still In вЂ” ${inL.length}</div>`+inL.map(makeRow).join('');
  if(tbdL.length) html+=`<div class="sec-hdr">вЏі Best-Third TBD вЂ” ${tbdL.length}</div>`+tbdL.map(makeRow).join('');
  if(outL.length) html+=`<div class="sec-hdr">вќЊ Eliminated вЂ” ${outL.length}</div>`+outL.map(makeRow).join('');
  if(!html) html=`<div class="empty-state"><div class="empty-icon">рџ”Ќ</div><div class="empty-title">No results</div></div>`;
  document.getElementById('content').innerHTML=html;
}

function toggleExpand(tid) {
  document.getElementById(tid)?.classList.toggle('open');
  document.getElementById('chev_'+tid)?.classList.toggle('open');
}

// в”Ђв”Ђ RENDER: CLASHES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderClashes(st) {
  const clashes=[], seen=new Set();
  for (const m of st.allMatches) {
    if(m.stage==='GROUP_STAGE') continue;
    const h=norm(m.home),a=norm(m.away);
    if(!SYND_TEAMS.has(h)||!SYND_TEAMS.has(a)) continue;
    const key=`${m.utcDate}|${h}|${a}`;
    if(seen.has(key)) continue; seen.add(key);
    clashes.push({...m,_h:h,_a:a});
  }
  clashes.sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));

  if(!clashes.length){
    const alive=SYNDICATE.filter(s=>!resolveStatus(s.team,st).code.startsWith('OUT_')).length;
    document.getElementById('content').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">вљ”пёЏ</div>
        <div class="empty-title">No syndicate clashes yet</div>
        <div class="empty-sub">When two syndicate teams face each other in the knockout rounds, it'll appear here.</div>
        <div class="empty-sub" style="margin-top:12px;color:#3b8fd4">${alive} syndicate teams still in the competition.</div>
      </div>`; return;
  }

  const makeClash=m=>{
    const hs=TEAM_MAP[m._h],as=TEAM_MAP[m._a];
    const live=m.status==='IN_PLAY'||m.status==='PAUSED', done=m.status==='FINISHED';
    const scoreHtml=done
      ?`<div class="clash-score">${m.homeScore}вЂ“${m.awayScore}</div><div class="clash-date">${fmtDate(m.utcDate)}</div>`
      :live?`<div class="clash-score live">${m.homeScore}вЂ“${m.awayScore}</div><div class="clash-date">рџ”ґ LIVE</div>`
      :`<div class="clash-score" style="font-size:.9rem;color:#7a9ab0">vs</div><div class="clash-date">${fmtDT(m.utcDate)}</div>`;
    let result='';
    if(done){
      const w=m.winner==='HOME_TEAM'?m._h:m.winner==='AWAY_TEAM'?m._a:null;
      if(w){const we=TEAM_MAP[w]; result=`<div class="clash-result won">${we.flag} ${w} advance вЂ” ${we.people.join(', ')}!</div>`;}
      else result=`<div class="clash-result">Draw вЂ” went to extra time</div>`;
    }
    return `<div class="clash-card">
      <div class="clash-header">
        <div class="clash-team"><div class="clash-flag">${hs.flag}</div><div class="clash-name">${m._h}</div></div>
        <div class="clash-score-box">${scoreHtml}</div>
        <div class="clash-team right"><div class="clash-flag">${as.flag}</div><div class="clash-name">${m._a}</div></div>
      </div>
      <div class="clash-body">
        <div class="clash-people">
          <div class="clash-col">${hs.people.map(p=>`вЂў ${p}`).join('<br>')}</div>
          <div class="clash-col right">${as.people.map(p=>`${p} вЂў`).join('<br>')}</div>
        </div>
        ${result}
        <div class="clash-stage">${KO_LONG[m.stage]||m.stage}</div>
      </div></div>`;
  };

  document.getElementById('content').innerHTML=
    `<div class="sec-hdr">вљ”пёЏ Syndicate Clashes вЂ” ${clashes.length}</div>`+clashes.map(makeClash).join('');
}

// в”Ђв”Ђ RENDER: ALL TEAMS (in content area) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

// в”Ђв”Ђ MODAL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function showModal(team) {
  if (!lastState) return;
  const s=TEAM_MAP[team]; if(!s) return;
  // Clear search when opening modal from search results
  clearSearch();

  const status=resolveStatus(team,lastState), pts=POINTS[status.code]||0;
  document.getElementById('m-flag').textContent=s.flag;
  document.getElementById('m-name').textContent=team;
  document.getElementById('m-status-badge').innerHTML=
    `<span class="badge ${status.badge}">${status.label}</span> <span class="pts-badge pts-${pts}" style="display:inline-block;min-width:0;padding:3px 8px">${pts} pts</span>`;

  // Progress strip
  const code=status.code;
  const sr={CHAMPION:5,OUT_FINAL:5,IN_SEMI:5,OUT_SEMI:4,OUT_3RD:4,IN_QUARTER:4,OUT_QUARTER:3,IN_R16:3,OUT_R16:2,IN_R32:2,OUT_R32:1,QUALIFIED:1,GROUP:0,TBD:0,OUT_GROUP:-1,UNKNOWN:-1}[code]??0;
  const isElim=code.startsWith('OUT_');
  const items=[];
  STAGE_LIST.forEach((stage,i)=>{
    const reached=i<=sr, current=i===sr&&!isElim, elimHere=isElim&&i===sr;
    const sc=elimHere?'eliminated':reached&&!current?'done':current?'current':'future';
    const lc=i<sr?'done':'future';
    if(i>0) items.push(`<div class="ps-line ${lc}"></div>`);
    items.push(`<div class="ps-step ${sc}"><div class="ps-circle">${elimHere?'вњ•':reached?'вњ“':i+1}</div><div class="ps-label">${stage.label}</div></div>`);
  });
  document.getElementById('m-progress').innerHTML=items.join('');

  // Stats
  const ms=(lastState.matchesByTeam[team]||[]).filter(m=>m.status==='FINISHED');
  let gf=0,ga=0,w=0,d=0,l=0;
  for(const m of ms){
    if(m._h===team){gf+=m.homeScore;ga+=m.awayScore;}else{gf+=m.awayScore;ga+=m.homeScore;}
    const ic=matchIcon(m,team); if(ic==='вњ…')w++;else if(ic==='вќЊ')l++;else d++;
  }
  const gd=gf-ga;
  document.getElementById('m-stats').innerHTML=`
    <div class="stat-box"><div class="stat-box-num">${w}</div><div class="stat-box-lbl">Won</div></div>
    <div class="stat-box"><div class="stat-box-num">${d}</div><div class="stat-box-lbl">Drawn</div></div>
    <div class="stat-box"><div class="stat-box-num">${l}</div><div class="stat-box-lbl">Lost</div></div>
    <div class="stat-box"><div class="stat-box-num">${gf}</div><div class="stat-box-lbl">Scored</div></div>
    <div class="stat-box"><div class="stat-box-num">${ga}</div><div class="stat-box-lbl">Conceded</div></div>
    <div class="stat-box"><div class="stat-box-num ${gd>=0?'pos-num':'neg-num'}">${gd>=0?'+':''}${gd}</div><div class="stat-box-lbl">GD</div></div>`;

  // Scorers
  const sc=(lastScorers[team]||[]);
  const scsec=document.getElementById('m-scorers-sec'), scdiv=document.getElementById('m-scorers-div');
  if(sc.length){
    document.getElementById('m-scorers-table').innerHTML=
      `<tr><th>Player</th><th style="text-align:right">вљЅ Goals</th><th style="text-align:right">рџ…°пёЏ Assists</th></tr>`+
      sc.map(x=>`<tr><td>${x.player}</td><td class="sc-goals">${x.goals}</td><td class="sc-assists">${x.assists||0}</td></tr>`).join('');
    scsec.style.display=''; scdiv.style.display='';
  } else { scsec.style.display='none'; scdiv.style.display='none'; }

  // Next fixture
  const upcoming=(lastState.matchesByTeam[team]||[]).find(m=>m.status==='SCHEDULED'||m.status==='TIMED');
  const nsec=document.getElementById('m-next-sec'), ndiv=document.getElementById('m-next-div');
  if(upcoming){
    const opp=upcoming._h===team?upcoming._a:upcoming._h, oe=TEAM_MAP[opp];
    document.getElementById('m-next').innerHTML=`<div class="nf-label">${KO_LONG[upcoming.stage]||'Group Stage'}</div>${oe?.flag||''} <strong>vs ${opp}</strong> вЂ” ${fmtDT(upcoming.utcDate)}`;
    nsec.style.display=''; ndiv.style.display='';
  } else { nsec.style.display='none'; ndiv.style.display='none'; }

  // All matches
  const allMs=(lastState.matchesByTeam[team]||[]);
  document.getElementById('m-matches').innerHTML=allMs.length
    ?allMs.map(m=>{
        const opp=m._h===team?m._a:m._h;
        const sl=m.stage==='GROUP_STAGE'?`Group ${(m.group||'').replace('GROUP_','')}`:(KO_SHORT[m.stage]||m.stage);
        return `<div class="modal-match">
          <span class="mm-date">${fmtDate(m.utcDate)}</span>
          <div class="mm-vs"><div>vs ${opp}</div><div class="mm-stage">${sl}</div></div>
          <span class="mm-score">${teamScore(m,team)}</span>
          <span class="mm-icon">${matchIcon(m,team)}</span>
        </div>`;
      }).join('')
    :'<div style="color:#4a6a80;font-size:.8rem">No fixtures yet</div>';

  document.getElementById('m-colleagues').innerHTML=s.people.map(p=>`вЂў ${p}`).join('<br>');
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e){if(e.target===document.getElementById('overlay'))closeModalForce();}
function closeModalForce(){document.getElementById('overlay').classList.remove('open');}

// в”Ђв”Ђ BANNER & STATS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  }
  const next=st.allMatches.filter(m=>(m.status==='SCHEDULED'||m.status==='TIMED')&&(SYND_TEAMS.has(norm(m.home))||SYND_TEAMS.has(norm(m.away))))
    .sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate))[0];
  if(next){
    const h=TEAM_MAP[norm(next.home)],a=TEAM_MAP[norm(next.away)];

function renderStats(st) {
  const codes=SYNDICATE.map(s=>resolveStatus(s.team,st).code);

// в”Ђв”Ђ FETCH & UPDATE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function update() {
  try {
    let matches, rawScorers=[];
    if(USE_JSON){
      const res=await fetch(`${DATA_URL}?_=${Date.now()}`);
      if(!res.ok) throw new Error(`Could not load ${DATA_URL} (${res.status})`);
      const data=await res.json();
      matches=data.matches; rawScorers=data.scorers||[];
    } else {
      const res=await fetch(`${HA_URL}/api/states/${HA_SENSOR}`,{headers:{'Authorization':`Bearer ${HA_TOKEN}`}});
      if(!res.ok) throw new Error(`HA API returned ${res.status}.`);
      const data=await res.json();
      matches=data.attributes?.matches;
    }
    if(!Array.isArray(matches)) throw new Error('Match data is missing or invalid.');

    lastScorers={};
    for(const s of rawScorers){ const t=norm(s.team); if(!lastScorers[t]) lastScorers[t]=[]; lastScorers[t].push(s); }

    lastState=processMatches(matches);
    renderStats(lastState);
    renderBanner(lastState);
    renderCurrentTab();

    document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('error-msg').style.display='none';
  } catch(err) {
    const el=document.getElementById('error-msg');
    el.style.display='block'; el.textContent='вљ пёЏ '+err.message;
    document.getElementById('last-updated').textContent='Update failed';
    console.error('[wc2026]',err);
  }
}

update();
setInterval(update,REFRESH_MS);
</script>
</body>
</html>
