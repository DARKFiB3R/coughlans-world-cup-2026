<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>⚽ Coughlans World Cup 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a1628; color: #e8edf5; min-height: 100vh; }

/* ── HEADER ── */
header { background: linear-gradient(135deg,#0d2b1a,#0a1f30); padding: 12px 16px; border-bottom: 2px solid #27ae60; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 1.05rem; font-weight: 700; }
.header-right { text-align: right; }
#live-label { font-size: .68rem; color: #7a9ab0; }
#last-updated { font-size: .65rem; color: #7a9ab0; margin-top: 2px; }
.live-pill { display: inline-block; background: #c0392b; color: #fff; font-size: .58rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: .5px; margin-left: 4px; animation: blink 1s infinite; vertical-align: middle; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── BANNERS ── */
#inapp-banner { display: none; background: #1a2a3a; padding: 6px 14px; font-size: .72rem; color: #7a9ab0; border-bottom: 1px solid #1a3050; text-align: center; }
#inapp-banner strong { color: #e8edf5; }
#next-banner { display: none; background: #0d2035; border-bottom: 1px solid #1a3050; padding: 7px 14px; font-size: .75rem; color: #7a9ab0; }
#next-banner strong { color: #e8edf5; }

/* ── STATS BAR ── */
.stats-bar { display: flex; background: #0d1f35; border-bottom: 1px solid #1a3050; }
.stat { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 7px 4px; border-right: 1px solid #1a3050; transition: background .15s; }
.stat:last-child { border-right: none; }
.stat.clickable { cursor: pointer; }
.stat.clickable:hover { background: rgba(255,255,255,.06); }
.stat.filter-active { background: rgba(39,174,96,.1); border-top: 2px solid #27ae60; }
.stat-num { font-size: 1.05rem; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: .58rem; color: #7a9ab0; margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
.c-in{color:#27ae60} .c-tbd{color:#f39c12} .c-out{color:#e74c3c} .c-all{color:#7a9ab0}

/* ── SEARCH ── */
.search-wrap { position: relative; padding: 8px 14px; background: #0d1f35; border-bottom: 1px solid #1a3050; }
#search-input { width: 100%; background: #081422; border: 1px solid #1a3050; border-radius: 8px; padding: 7px 34px 7px 12px; color: #e8edf5; font-size: .82rem; outline: none; }
#search-input:focus { border-color: #27ae60; }
#search-clear { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #7a9ab0; font-size: 1rem; cursor: pointer; padding: 0 4px; display: none; }
#search-clear:hover { color: #e8edf5; }

/* ── TABS ── */
.tab-bar { display: flex; background: #0a1628; border-bottom: 2px solid #1a3050; position: sticky; top: 48px; z-index: 99; }
.tab-btn { flex: 1; background: none; border: none; cursor: pointer; padding: 10px 4px; font-size: .76rem; color: #7a9ab0; font-family: inherit; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .15s, border-color .15s; white-space: nowrap; }
.tab-btn.active { color: #27ae60; border-bottom-color: #27ae60; }
.tab-btn:hover:not(.active) { color: #b0c4d8; }

/* ── SECTION HEADER ── */
.sec-hdr { padding: 6px 14px; font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #7a9ab0; background: #0d1f35; border-bottom: 1px solid #1a3050; border-top: 1px solid #1a3050; margin-top: 6px; }
.sec-hdr:first-child { margin-top: 0; }

/* ── CREST ── */
.crest { width: 32px; height: 32px; object-fit: contain; flex-shrink: 0; }
.crest-sm { width: 22px; height: 22px; object-fit: contain; }
.crest-lg { width: 52px; height: 52px; object-fit: contain; }

/* ── LEADERBOARD ROW ── */
.lb-row { display: grid; grid-template-columns: 28px 34px 1fr auto; gap: 8px; align-items: center; padding: 9px 14px; border-bottom: 1px solid #111e30; cursor: pointer; transition: background .15s; }
.lb-row:hover { background: rgba(255,255,255,.04); }
.lb-row.eliminated { opacity: .38; }
.lb-rank { font-size: .9rem; font-weight: 800; color: #7a9ab0; text-align: center; }
.lb-rank.gold{color:#f1c40f} .lb-rank.silver{color:#bdc3c7} .lb-rank.bronze{color:#cd7f32}
.lb-info { min-width: 0; }
.lb-name { font-size: .92rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-team { font-size: .7rem; color: #7a9ab0; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
.pts-badge { font-size: .72rem; font-weight: 700; padding: 4px 8px; border-radius: 10px; white-space: nowrap; min-width: 52px; text-align: center; }
.pts-0{background:#111e30;color:#4a6a80;border:1px solid #1a3050}
.pts-1{background:#0d2035;color:#3b8fd4;border:1px solid #2a6fa8}
.pts-2,.pts-3{background:#0d2a1a;color:#27ae60;border:1px solid #27ae60}
.pts-4,.pts-5{background:#1a2a0a;color:#8bc34a;border:1px solid #6a9a2a}
.pts-6{background:#2a1f00;color:#f39c12;border:1px solid #b57206}
.pts-7{background:#3a2800;color:#ffc107;border:1px solid #ffc107}

/* ── FORM DOTS ── */
.form-dots { display: inline-flex; gap: 2px; align-items: center; }
.form-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── TEAM ROW ── */
.team-row { display: grid; grid-template-columns: 36px 1fr auto 18px; gap: 10px; align-items: center; padding: 9px 14px; border-bottom: 1px solid #111e30; cursor: pointer; transition: background .15s; }
.team-row:hover { background: rgba(255,255,255,.04); }
.team-row.eliminated { opacity: .38; }
.team-info { min-width: 0; }
.team-name { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-people { font-size: .7rem; color: #7a9ab0; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chev { color: #4a6a80; font-size: .7rem; transition: transform .2s; }
.chev.open { transform: rotate(90deg); }

/* ── EXPAND ── */
.expand { display: none; background: #081422; border-bottom: 1px solid #1a3050; padding: 10px 14px 12px 60px; }
.expand.open { display: block; }
.ex-match { display: flex; gap: 8px; font-size: .73rem; padding: 3px 0; color: #b0c4d8; align-items: center; }
.ex-date { color: #4a6a80; min-width: 52px; }
.ex-vs { flex: 1; }
.ex-score { font-weight: 700; min-width: 36px; text-align: right; }
.ex-icon { min-width: 18px; text-align: right; }
.ex-btn { display: block; margin-top: 10px; width: 100%; background: #0d2a1a; border: 1px solid #27ae60; color: #27ae60; padding: 8px 12px; border-radius: 8px; font-size: .8rem; font-weight: 700; cursor: pointer; font-family: inherit; text-align: center; transition: background .15s; }
.ex-btn:hover { background: #1a4a2a; }

/* ── ALL TEAMS VIEW ── */
.at-row { display: grid; grid-template-columns: 36px 1fr auto; gap: 10px; align-items: center; padding: 10px 14px; border-bottom: 1px solid #111e30; cursor: pointer; transition: background .15s; }
.at-row:hover { background: rgba(255,255,255,.04); }
.at-row.eliminated { opacity: .38; }
.at-info { min-width: 0; }
.at-name { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.at-colleagues { font-size: .68rem; color: #7a9ab0; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.at-scorers { font-size: .68rem; color: #f39c12; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── CLASHES ── */
.clash-card { margin: 10px 14px; border-radius: 10px; border: 1px solid #1a3050; overflow: hidden; }
.clash-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: #0d1f35; padding: 10px 14px; gap: 8px; }
.clash-team { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.clash-team.right { align-items: flex-end; }
.clash-flag { font-size: 1.4rem; line-height: 1; }
.clash-name { font-size: .82rem; font-weight: 700; text-align: center; }
.clash-team.right .clash-name { text-align: right; }
.clash-score-box { text-align: center; }
.clash-score { font-size: 1.3rem; font-weight: 800; line-height: 1; }
.clash-score.live { color: #e74c3c; }
.clash-date { font-size: .65rem; color: #7a9ab0; margin-top: 2px; white-space: nowrap; }
.clash-body { padding: 8px 14px; background: #081422; }
.clash-people { display: flex; }
.clash-col { flex: 1; font-size: .7rem; color: #7a9ab0; line-height: 1.8; }
.clash-col.right { text-align: right; }
.clash-result { text-align: center; font-size: .7rem; margin-top: 6px; }
.clash-result.won { color: #27ae60; font-weight: 700; }
.clash-stage { font-size: .67rem; color: #4a6a80; text-align: center; margin-top: 4px; letter-spacing: .5px; text-transform: uppercase; }

/* ── BADGES ── */
.badge { font-size: .65rem; font-weight: 700; padding: 3px 7px; border-radius: 10px; white-space: nowrap; min-width: 72px; text-align: center; letter-spacing: .2px; }
.b-champion{background:#856404;color:#ffc107;border:1px solid #ffc107}
.b-in{background:#0d2a1a;color:#27ae60;border:1px solid #27ae60}
.b-group{background:#0d2035;color:#3b8fd4;border:1px solid #2a6fa8}
.b-tbd{background:#2d1f00;color:#f39c12;border:1px solid #b57206}
.b-out{background:#2a0d0d;color:#c0392b;border:1px solid #7a2020}

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 300; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: #0d1f35; width: 100%; max-width: 500px; border-radius: 16px 16px 0 0; border-top: 3px solid #27ae60; max-height: 86vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 36px; height: 4px; background: #3a5070; border-radius: 2px; margin: 10px auto 0; }

/* Modal team header band */
.modal-team-band { padding: 12px 16px 10px; display: flex; align-items: center; gap: 14px; }
.modal-team-text { flex: 1; min-width: 0; }
.modal-team-name { font-size: 1.15rem; font-weight: 700; }
.modal-team-sub { font-size: .72rem; color: #7a9ab0; margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.modal-close { background: rgba(0,0,0,.3); border: none; color: rgba(255,255,255,.7); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.modal-close:hover { background: rgba(0,0,0,.5); color: #fff; }

/* Modal tabs */
.modal-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,.1); }
.modal-tab { flex: 1; background: none; border: none; padding: 8px 4px; font-size: .75rem; color: rgba(255,255,255,.5); cursor: pointer; font-family: inherit; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.modal-tab.active { color: #fff; border-bottom-color: #fff; }

.modal-sec { padding: 8px 16px; }
.modal-sec-title { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.5); margin-bottom: 7px; }
.divider { height: 1px; background: rgba(255,255,255,.08); margin: 2px 0; }

/* Progress Strip */
.progress-strip { display: flex; align-items: flex-start; padding: 4px 0 8px; }
.ps-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.ps-circle { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 700; }
.ps-step.done .ps-circle { background: rgba(255,255,255,.9); color: #0a1628; }
.ps-step.current .ps-circle { background: rgba(255,255,255,.9); color: #0a1628; box-shadow: 0 0 0 4px rgba(255,255,255,.2); }
.ps-step.future .ps-circle { background: rgba(255,255,255,.1); color: rgba(255,255,255,.4); border: 1px solid rgba(255,255,255,.2); }
.ps-step.eliminated .ps-circle { background: rgba(231,76,60,.3); color: #e74c3c; border: 1px solid #e74c3c; }
.ps-label { font-size: .58rem; color: rgba(255,255,255,.5); white-space: nowrap; text-align: center; }
.ps-line { flex: 1; height: 2px; margin-top: 12px; min-width: 10px; }
.ps-line.done { background: rgba(255,255,255,.5); }
.ps-line.future,.ps-line.current { background: rgba(255,255,255,.15); }

/* Modal stats boxes */
.stats-row { display: flex; margin: 4px 0; }
.stat-box { flex: 1; text-align: center; padding: 8px 4px; background: rgba(0,0,0,.2); border-right: 1px solid rgba(255,255,255,.08); }
.stat-box:first-child { border-radius: 6px 0 0 6px; }
.stat-box:last-child { border-right: none; border-radius: 0 6px 6px 0; }
.stat-box-num { font-size: 1.2rem; font-weight: 700; line-height: 1; }
.stat-box-lbl { font-size: .6rem; color: rgba(255,255,255,.5); margin-top: 2px; }
.pos-num{color:#27ae60} .neg-num{color:#e74c3c}

/* Possession bar */
.poss-bar-wrap { margin: 8px 0 4px; }
.poss-label { display: flex; justify-content: space-between; font-size: .7rem; margin-bottom: 3px; }
.poss-bar { height: 6px; background: rgba(255,255,255,.1); border-radius: 3px; overflow: hidden; }
.poss-bar-fill { height: 100%; border-radius: 3px; transition: width .5s; }

/* Match event list */
.event-list { padding: 4px 0; }
.event-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: .77rem; border-bottom: 1px solid rgba(255,255,255,.05); }
.event-row:last-child { border-bottom: none; }
.ev-min { min-width: 36px; color: rgba(255,255,255,.5); font-size: .7rem; text-align: right; }
.ev-icon { font-size: .85rem; min-width: 18px; text-align: center; }
.ev-player { flex: 1; }
.ev-team-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ev-type { font-size: .65rem; color: rgba(255,255,255,.4); }

/* Match stats comparison */
.match-stat-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: .75rem; }
.ms-val { min-width: 28px; text-align: center; font-weight: 600; }
.ms-label { flex: 1; text-align: center; color: rgba(255,255,255,.5); font-size: .7rem; }
.ms-bar-wrap { flex: 2; height: 4px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden; position: relative; }
.ms-bar-home { height: 100%; border-radius: 2px; position: absolute; left: 0; }
.ms-bar-away { height: 100%; border-radius: 2px; position: absolute; right: 0; }

/* Scorers table */
.scorers-table { width: 100%; border-collapse: collapse; font-size: .75rem; }
.scorers-table th { text-align: left; color: rgba(255,255,255,.5); font-weight: 600; padding: 3px 4px; border-bottom: 1px solid rgba(255,255,255,.1); }
.scorers-table td { padding: 4px 4px; border-bottom: 1px solid rgba(255,255,255,.05); }
.scorers-table tr:last-child td { border-bottom: none; }
.sc-goals { font-weight: 700; color: #f39c12; text-align: right; }
.sc-assists { color: rgba(255,255,255,.5); text-align: right; }

/* Squad sheet */
.squad-pos-hdr { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.4); padding: 8px 0 3px; }
.squad-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.05); font-size: .78rem; }
.squad-row:last-child { border-bottom: none; }
.squad-shirt { min-width: 22px; text-align: center; color: rgba(255,255,255,.4); font-size: .7rem; font-weight: 600; }
.squad-name { flex: 1; }
.squad-goals { font-size: .72rem; color: #f39c12; white-space: nowrap; }

/* Next fixture */
.next-fixture { background: rgba(0,0,0,.2); border-radius: 6px; padding: 8px 10px; font-size: .78rem; margin-top: 4px; }
.nf-label { font-size: .62rem; color: rgba(255,255,255,.5); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
.colleagues-list { font-size: .82rem; color: #c8d8e8; line-height: 1.9; }

/* Match result list in Results tab */
.modal-match { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.06); font-size: .75rem; align-items: flex-start; }
.modal-match:last-child { border-bottom: none; }
.mm-date { color: rgba(255,255,255,.45); min-width: 52px; font-size: .7rem; margin-top: 2px; }
.mm-body { flex: 1; }
.mm-matchup { display: flex; align-items: center; gap: 6px; }
.mm-score { font-weight: 700; min-width: 36px; text-align: right; margin-top: 2px; }
.mm-icon { min-width: 20px; text-align: right; margin-top: 2px; }
.mm-stage { font-size: .62rem; color: rgba(255,255,255,.35); margin-top: 2px; }
.mm-headline { font-size: .67rem; color: rgba(255,255,255,.4); margin-top: 3px; font-style: italic; }
.mm-attendance { font-size: .65rem; color: rgba(255,255,255,.3); }

/* Empty state */
.empty-state { text-align: center; padding: 48px 24px; }
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-title { font-size: .95rem; font-weight: 700; margin-bottom: 8px; }
.empty-sub { font-size: .78rem; color: #7a9ab0; line-height: 1.5; }

#loading { text-align: center; padding: 48px 20px; color: #7a9ab0; font-size: .9rem; }
.spinner { font-size: 2rem; display: block; margin-bottom: 12px; animation: spin 1.5s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
#error-msg { display: none; padding: 14px; margin: 12px; background: #2a0d0d; border: 1px solid #7a2020; border-radius: 6px; color: #e74c3c; font-size: .8rem; }
</style>
</head>
<body>

<header>
  <h1>⚽ Coughlans World Cup 2026</h1>
  <div class="header-right">
    <div id="live-label">Auto-updating</div>
    <div id="last-updated">Loading…</div>
  </div>
</header>

<div id="inapp-banner">Tap <strong>⋮ → Open in browser</strong> for best experience &amp; to bookmark</div>
<div id="next-banner"></div>

<div class="stats-bar">
  <div class="stat clickable" id="stat-all" onclick="showAllTeams()">
    <span class="stat-num c-all" id="sn-all">—</span><span class="stat-lbl">Teams</span>
  </div>
  <div class="stat clickable" id="stat-in" onclick="toggleFilter('in')">
    <span class="stat-num c-in" id="sn-in">—</span><span class="stat-lbl">In</span>
  </div>
  <div class="stat clickable" id="stat-tbd" onclick="toggleFilter('tbd')">
    <span class="stat-num c-tbd" id="sn-tbd">—</span><span class="stat-lbl">TBD</span>
  </div>
  <div class="stat clickable" id="stat-out" onclick="toggleFilter('out')">
    <span class="stat-num c-out" id="sn-out">—</span><span class="stat-lbl">Out</span>
  </div>
</div>

<div class="search-wrap">
  <input id="search-input" type="search" placeholder="🔍 Search names or teams…"
    oninput="onSearch(this.value)" onsearch="onSearch(this.value)">
  <button id="search-clear" onclick="clearSearch()">✕</button>
</div>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('leaderboard')">🏆 Leaderboard</button>
  <button class="tab-btn"        onclick="switchTab('teamstats')">📊 Team Stats</button>
  <button class="tab-btn"        onclick="switchTab('clashes')">⚔️ Clashes</button>
</nav>

<div id="error-msg"></div>
<div id="content"><div id="loading"><span class="spinner">⚽</span>Fetching match data…</div></div>

<!-- TEAM MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-team-band" id="m-band">
      <img class="crest-lg" id="m-crest" src="" alt="">
      <div class="modal-team-text">
        <div class="modal-team-name" id="m-name"></div>
        <div class="modal-team-sub" id="m-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModalForce()">✕</button>
    </div>

    <!-- Modal inner tabs -->
    <div class="modal-tabs" id="m-tabs">
      <button class="modal-tab active" onclick="switchModalTab('overview')">Overview</button>
      <button class="modal-tab"        onclick="switchModalTab('matches')">Matches</button>
      <button class="modal-tab"        onclick="switchModalTab('squad')" id="m-squad-tab">Squad</button>
    </div>

    <div id="m-panel-overview">
      <div class="modal-sec">
        <div class="modal-sec-title">Tournament Progress</div>
        <div class="progress-strip" id="m-progress"></div>
      </div>
      <div class="divider"></div>
      <div class="modal-sec">
        <div class="modal-sec-title">Match Stats</div>

  { team:"Egypt",        flag:"🇪🇬", people:["Mia Green","Cheryl Hamilton"] },
];
const TEAM_MAP   = Object.fromEntries(SYNDICATE.map(s=>[s.team,s]));
const SYND_TEAMS = new Set(SYNDICATE.map(s=>s.team));

// ── ALIASES ───────────────────────────────────────────────────────────────────
const ALIASES = {
  "Korea Republic":"South Korea","Bosnia-H.":"Bosnia","Bosnia and Herzegovina":"Bosnia",
  "Bosnia-Herzegovina":"Bosnia","Congo DR":"DR Congo","Curaçao":"Curacao",
  "Côte d'Ivoire":"Ivory Coast","Türkiye":"Turkey","United States":"USA",
  "Cape Verde Islands":"Cape Verde",
};
const norm = n => ALIASES[n] || n;

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const SORT_ORDER = {
  CHAMPION:0,FINALIST:1,IN_SEMI:2,IN_QUARTER:3,IN_R16:4,IN_R32:5,
  QUALIFIED:6,GROUP:7,TBD:8,
  OUT_FINAL:9,OUT_SEMI:10,OUT_3RD:11,OUT_QUARTER:12,OUT_R16:13,OUT_R32:14,OUT_GROUP:15,UNKNOWN:16,
};
const POINTS = {
  CHAMPION:7,OUT_FINAL:6,IN_SEMI:5,OUT_SEMI:4,OUT_3RD:4,IN_QUARTER:4,
  OUT_QUARTER:3,IN_R16:3,OUT_R16:2,IN_R32:2,OUT_R32:1,QUALIFIED:1,
  TBD:0,GROUP:0,OUT_GROUP:0,UNKNOWN:0,
};
const KO_LONG  = {LAST_32:"Round of 32",LAST_16:"Round of 16",QUARTER_FINALS:"Quarter-Final",SEMI_FINALS:"Semi-Final",THIRD_PLACE:"3rd Place",FINAL:"Final"};
const KO_SHORT = {LAST_32:"Rd 1",LAST_16:"Rd 2",QUARTER_FINALS:"Rd 3",SEMI_FINALS:"Rd 4",FINAL:"Final"};
const STAGE_LIST = [{label:'Group'},{label:'Rd 1'},{label:'Rd 2'},{label:'Rd 3'},{label:'Rd 4'},{label:'🏆'}];

// ── STATE ─────────────────────────────────────────────────────────────────────
let lastState    = null;
let lastScorers  = {};   // normName → [{player,goals,assists}]
let lastTeams    = {};   // normName → {color,altColor,logo,form}
let lastSquads   = {};   // normName → [{name,shirt,position}]
let activeFilter = null;
let activeTab    = 'leaderboard';
let modalTeam    = null;
let modalTab     = 'overview';

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmtDate = u => new Date(u).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const fmtTime = u => new Date(u).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
const fmtDT   = u => `${fmtDate(u)}, ${fmtTime(u)} UTC`;
const escQ    = s => (s||'').replace(/'/g,"\\'");

function teamColor(team) {
  return lastTeams[team]?.color || '#1a3050';
}

function teamCrest(team, cls='crest') {
  const logo = lastTeams[team]?.logo;
  const flag = TEAM_MAP[team]?.flag || '⚽';
  if (logo) return `<img class="${cls}" src="${logo}" alt="${team}" onerror="this.outerHTML='<span style=\\'font-size:1.4rem\\'>${flag}</span>'">`;
  return `<span style="font-size:${cls==='crest-lg'?'2rem':'1.4rem'}">${flag}</span>`;
}

function formDots(form) {
  if (!form) return '';
  return '<span class="form-dots">' +
    form.split('').slice(-5).map(r => {
      const c = r==='W'?'#27ae60':r==='L'?'#e74c3c':'#f39c12';
      return `<span class="form-dot" style="background:${c}" title="${r==='W'?'Win':r==='L'?'Loss':'Draw'}"></span>`;
    }).join('') + '</span>';
}

function matchIcon(m, team) {
  if (m.status !== 'FINISHED') return m.status==='IN_PLAY'||m.status==='PAUSED' ? '🔴' : '📅';
  const won  = (m._h===team&&m.winner==='HOME_TEAM') || (m._a===team&&m.winner==='AWAY_TEAM');
  const lost = (m._h===team&&m.winner==='AWAY_TEAM') || (m._a===team&&m.winner==='HOME_TEAM');
  return won ? '✅' : lost ? '❌' : '🟰';
}
function teamScore(m, team) {
  if (m.status !== 'FINISHED') return '';
  return m._h===team ? `${m.homeScore}–${m.awayScore}` : `${m.awayScore}–${m.homeScore}`;
}

// ── PROCESS MATCHES ───────────────────────────────────────────────────────────
function processMatches(matches) {
  const groupStats={}, koRecord={}, groupMatchCounts={}, matchesByTeam={};

  for (const m of matches) {
    const h=norm(m.home), a=norm(m.away);
    for (const t of [h,a]) {
      if (!matchesByTeam[t]) matchesByTeam[t]=[];
      matchesByTeam[t].push({...m, _h:h, _a:a});
    }
  }
  for (const t in matchesByTeam)
    matchesByTeam[t].sort((a,b) => new Date(a.utcDate)-new Date(b.utcDate));

  for (const m of matches.filter(m => m.status==='FINISHED')) {
    const h=norm(m.home), a=norm(m.away);
    if (m.stage==='GROUP_STAGE') {
      groupMatchCounts[m.group] = (groupMatchCounts[m.group]||0)+1;
      for (const t of [h,a]) if (!groupStats[t]) groupStats[t]={group:m.group,gp:0,pts:0,gf:0,ga:0};
      groupStats[h].gp++; groupStats[a].gp++;
      groupStats[h].gf+=m.homeScore; groupStats[h].ga+=m.awayScore;
      groupStats[a].gf+=m.awayScore; groupStats[a].ga+=m.homeScore;
      if      (m.winner==='HOME_TEAM') { groupStats[h].pts+=3; }
      else if (m.winner==='AWAY_TEAM') { groupStats[a].pts+=3; }
      else                             { groupStats[h].pts+=1; groupStats[a].pts+=1; }
    } else {
      const winner=m.winner==='HOME_TEAM'?h:a, loser=m.winner==='HOME_TEAM'?a:h;
      if (!koRecord[winner]) koRecord[winner]={};
      koRecord[winner].stage=m.stage; koRecord[winner].won=true;
      if (!koRecord[loser])  koRecord[loser]={};
      koRecord[loser].stage=m.stage;  koRecord[loser].eliminated=true;
    }
  }

  const byGroup={};
  for (const [t,s] of Object.entries(groupStats)) {
    if (!byGroup[s.group]) byGroup[s.group]=[];
    byGroup[s.group].push({team:t,...s});
  }
  const groupRanks={};
  for (const [grp,teams] of Object.entries(byGroup)) {
    const isDone=(groupMatchCounts[grp]||0)>=6;
    teams.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:(b.gf-b.ga)!==(a.gf-a.ga)?(b.gf-b.ga)-(a.gf-a.ga):b.gf-a.gf);
    teams.forEach((t,i)=>{ groupRanks[t.team]={rank:i+1,groupDone:isDone,...t}; });
  }

  const completedGroups = Object.values(groupMatchCounts).filter(c=>c>=6).length;
  const allGroupsDone   = completedGroups >= 12;
  const bestThird       = new Set();
  if (allGroupsDone) {
    const thirds = Object.entries(groupRanks)
      .filter(([,r])=>r.rank===3&&r.groupDone)
      .map(([t,r])=>({team:t,pts:r.pts,gd:r.gf-r.ga,gf:r.gf}));
    thirds.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:b.gd!==a.gd?b.gd-a.gd:b.gf-a.gf);
    thirds.slice(0,8).forEach(t=>bestThird.add(t.team));
  }

  const liveCount=matches.filter(m=>m.status==='IN_PLAY'||m.status==='PAUSED').length;
  return {groupStats,koRecord,groupRanks,bestThird,allGroupsDone,matchesByTeam,liveCount,allMatches:matches};
}

// ── STATUS ────────────────────────────────────────────────────────────────────
function resolveStatus(team, st) {
  const {koRecord,groupRanks,groupStats,bestThird,allGroupsDone}=st;
  const ko=koRecord[team], gr=groupRanks[team], gs=groupStats[team];
  if (ko) {
    const s=ko.stage;
    if (s==='FINAL') {
      if (ko.won)        return {code:'CHAMPION', label:'🏆 Champion',  badge:'b-champion'};
      if (ko.eliminated) return {code:'OUT_FINAL',label:'🥈 Runner-Up', badge:'b-out'};
    }
    if (s==='THIRD_PLACE') {
      if (ko.won)        return {code:'OUT_SEMI', label:'🥉 3rd Place', badge:'b-in'};
      if (ko.eliminated) return {code:'OUT_3RD',  label:'4th Place',    badge:'b-out'};
    }
    const inM ={LAST_32:'IN_R32',LAST_16:'IN_R16',QUARTER_FINALS:'IN_QUARTER',SEMI_FINALS:'IN_SEMI'};
    const outM={LAST_32:'OUT_R32',LAST_16:'OUT_R16',QUARTER_FINALS:'OUT_QUARTER',SEMI_FINALS:'OUT_SEMI'};
    if (ko.eliminated) return {code:outM[s]||'OUT_GROUP',label:`❌ Out – ${KO_LONG[s]||s}`,badge:'b-out'};
    if (ko.won)        return {code:inM[s]||'QUALIFIED', label:`✅ ${KO_SHORT[s]}`,          badge:'b-in'};
  }
  if (gr) {
    if (gr.groupDone) {
      if (gr.rank<=2)   return {code:'QUALIFIED',label:'✅ Qualified',    badge:'b-in'};
      if (gr.rank===3)  {
        if (allGroupsDone) {
          if (bestThird.has(team)) return {code:'QUALIFIED',label:'✅ Best 3rd',   badge:'b-in'};
          else                     return {code:'OUT_GROUP', label:'❌ Out – Group',badge:'b-out'};
        }
        return {code:'TBD',label:'⏳ Best 3rd?',badge:'b-tbd'};
      }
      return {code:'OUT_GROUP',label:'❌ Out – Group',badge:'b-out'};
    }
    return {code:'GROUP',label:`⚽ Group (${gr.gp||0} played)`,badge:'b-group'};
  }
  if (gs?.gp>0) return {code:'GROUP',label:`⚽ Group (${gs.gp} played)`,badge:'b-group'};
  return {code:'GROUP',label:'⚽ Group Stage',badge:'b-group'};
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function onSearch(val) {
  document.getElementById('search-clear').style.display = val ? 'block' : 'none';
  const q = val.toLowerCase().trim();
  document.querySelectorAll('.lb-row,.team-row,.at-row').forEach(r => {
    r.style.display = !q || r.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
function clearSearch() {
  const inp = document.getElementById('search-input');
  inp.value = '';
  document.getElementById('search-clear').style.display = 'none';
  onSearch('');
  inp.focus();
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function toggleFilter(f) {
  if (activeTab==='allteams') switchTab('leaderboard');
  activeFilter = activeFilter===f ? null : f;
  ['in','tbd','out'].forEach(x =>
    document.getElementById('stat-'+x)?.classList.toggle('filter-active', activeFilter===x));
  clearSearch();
  if (lastState) renderCurrentTab();
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('stat-all').classList.remove('filter-active');
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active',['leaderboard','teamstats','clashes'][i]===tab));
  clearSearch();
  if (lastState) renderCurrentTab();
}

function renderCurrentTab() {
  if      (activeTab==='leaderboard') renderLeaderboard(lastState);
  else if (activeTab==='teamstats')   renderTeamStats(lastState);
  else if (activeTab==='clashes')     renderClashes(lastState);
  else if (activeTab==='allteams')    renderAllTeams(lastState);
}

// ── RENDER: LEADERBOARD ───────────────────────────────────────────────────────
function renderLeaderboard(st) {
  const isOut=p=>p.status.code.startsWith('OUT_'), isTBD=p=>p.status.code==='TBD';

  let people = SYNDICATE.flatMap(s => {
    const status=resolveStatus(s.team,st), pts=POINTS[status.code]||0;
    return s.people.map(name=>({name,team:s.team,flag:s.flag,status,pts}));
  });
  people.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:(SORT_ORDER[a.status.code]??99)-(SORT_ORDER[b.status.code]??99));
  let rank=1;
  people.forEach((p,i)=>{ if(i>0&&p.pts<people[i-1].pts) rank=i+1; p.rank=rank; });

  if      (activeFilter==='in')  people=people.filter(p=>!isOut(p)&&!isTBD(p));
  else if (activeFilter==='tbd') people=people.filter(isTBD);
  else if (activeFilter==='out') people=people.filter(isOut);

  const rankCls=r=>r===1?'gold':r===2?'silver':r===3?'bronze':'';
  const rankLbl=r=>r===1?'🥇':r===2?'🥈':r===3?'🥉':`#${r}`;
  const form = team => lastTeams[team]?.form || '';

  const makeRow = p => `
    <div class="lb-row${isOut(p)?' eliminated':''}" onclick="showModal('${escQ(p.team)}')">
      <div class="lb-rank ${rankCls(p.rank)}">${rankLbl(p.rank)}</div>
      <div>${teamCrest(p.team)}</div>
      <div class="lb-info">
        <div class="lb-name">${p.name}</div>
        <div class="lb-team">${p.team} ${formDots(form(p.team))}</div>
      </div>
      <div class="pts-badge pts-${p.pts}">${p.pts} pt${p.pts!==1?'s':''}</div>
    </div>`;

  const active=people.filter(p=>!isOut(p)&&!isTBD(p)), tbd=people.filter(isTBD), out=people.filter(isOut);
  let html='';
  if(active.length) html+=`<div class="sec-hdr">🟢 Still In — ${active.length} people</div>`+active.map(makeRow).join('');
  if(tbd.length)    html+=`<div class="sec-hdr">⏳ Best-Third TBD — ${tbd.length} people</div>`+tbd.map(makeRow).join('');
  if(out.length)    html+=`<div class="sec-hdr">❌ Eliminated — ${out.length} people</div>`+out.map(makeRow).join('');
  if(!html) html=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No results</div></div>`;
  document.getElementById('content').innerHTML=html;
}

// ── RENDER: TEAM STATS ────────────────────────────────────────────────────────
function renderTeamStats(st) {
  const isOut=e=>e.status.code.startsWith('OUT_'), isTBD=e=>e.status.code==='TBD';
  let entries=SYNDICATE.map(s=>({...s,status:resolveStatus(s.team,st)}));
  entries.sort((a,b)=>(SORT_ORDER[a.status.code]??99)-(SORT_ORDER[b.status.code]??99));

  if      (activeFilter==='in')  entries=entries.filter(e=>!isOut(e)&&!isTBD(e));
  else if (activeFilter==='tbd') entries=entries.filter(isTBD);
  else if (activeFilter==='out') entries=entries.filter(isOut);

  const makeRow = e => {
    const tid='ex_'+e.team.replace(/[^a-z0-9]/gi,'_');
    const ms=(st.matchesByTeam[e.team]||[]).filter(m=>m.status==='FINISHED');
    const recent=ms.slice(-2).map(m=>`
      <div class="ex-match">
        <span class="ex-date">${fmtDate(m.utcDate)}</span>
        <span class="ex-vs">vs ${m._h===e.team?m._a:m._h}</span>
        <span class="ex-score">${teamScore(m,e.team)}</span>
        <span class="ex-icon">${matchIcon(m,e.team)}</span>
      </div>`).join('');
    return `
      <div class="team-row${isOut(e)?' eliminated':''}" onclick="toggleExpand('${tid}')">
        <div>${teamCrest(e.team)}</div>
        <div class="team-info"><div class="team-name">${e.team}</div><div class="team-people">${e.people.join(' · ')}</div></div>
        <div class="badge ${e.status.badge}">${e.status.label}</div>
        <div class="chev" id="chev_${tid}">›</div>
      </div>
      <div class="expand" id="${tid}">
        ${recent||'<div class="ex-match" style="color:#4a6a80">No results yet</div>'}
        <button class="ex-btn" onclick="event.stopPropagation();showModal('${escQ(e.team)}')">📊 Full Stats, Scorers &amp; Squad</button>
      </div>`;
  };

  const inL=entries.filter(e=>!isOut(e)&&!isTBD(e)), tbdL=entries.filter(isTBD), outL=entries.filter(isOut);
  let html='';
  if(inL.length)  html+=`<div class="sec-hdr">🟢 Still In — ${inL.length}</div>`+inL.map(makeRow).join('');
  if(tbdL.length) html+=`<div class="sec-hdr">⏳ Best-Third TBD — ${tbdL.length}</div>`+tbdL.map(makeRow).join('');
  if(outL.length) html+=`<div class="sec-hdr">❌ Eliminated — ${outL.length}</div>`+outL.map(makeRow).join('');
  if(!html) html=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No results</div></div>`;
  document.getElementById('content').innerHTML=html;
}

function toggleExpand(tid) {
  document.getElementById(tid)?.classList.toggle('open');
  document.getElementById('chev_'+tid)?.classList.toggle('open');
}

// ── RENDER: CLASHES ───────────────────────────────────────────────────────────
function renderClashes(st) {
  const clashes=[], seen=new Set();
  for (const m of st.allMatches) {
    if (m.stage==='GROUP_STAGE') continue;
    const h=norm(m.home), a=norm(m.away);
    if (!SYND_TEAMS.has(h)||!SYND_TEAMS.has(a)) continue;
    const key=`${m.utcDate}|${h}|${a}`;
    if (seen.has(key)) continue; seen.add(key);
    clashes.push({...m,_h:h,_a:a});
  }
  clashes.sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));

  if (!clashes.length) {
    const alive=SYNDICATE.filter(s=>!resolveStatus(s.team,st).code.startsWith('OUT_')).length;
    document.getElementById('content').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">⚔️</div>
        <div class="empty-title">No syndicate clashes yet</div>
        <div class="empty-sub">When two syndicate teams face each other in the knockout rounds, it'll appear here.</div>
        <div class="empty-sub" style="margin-top:12px;color:#3b8fd4">${alive} syndicate teams still in the competition.</div>
      </div>`; return;
  }

  const makeClash = m => {
    const hs=TEAM_MAP[m._h], as=TEAM_MAP[m._a];
    const live=m.status==='IN_PLAY'||m.status==='PAUSED', done=m.status==='FINISHED';
    const scoreHtml=done
      ?`<div class="clash-score">${m.homeScore}–${m.awayScore}</div><div class="clash-date">${fmtDate(m.utcDate)}</div>`
      :live?`<div class="clash-score live">${m.homeScore}–${m.awayScore}</div><div class="clash-date">🔴 LIVE</div>`
      :`<div class="clash-score" style="font-size:.9rem;color:#7a9ab0">vs</div><div class="clash-date">${fmtDT(m.utcDate)}</div>`;
    let result='';
    if (done) {
      const w=m.winner==='HOME_TEAM'?m._h:m.winner==='AWAY_TEAM'?m._a:null;
      if (w) { const we=TEAM_MAP[w]; result=`<div class="clash-result won">${we.flag} ${w} advance — ${we.people.join(', ')}!</div>`; }
      else result=`<div class="clash-result">Draw — went to extra time</div>`;
    }
    return `<div class="clash-card">
      <div class="clash-header">
        <div class="clash-team">${teamCrest(m._h,'crest')}<div class="clash-name">${m._h}</div></div>
        <div class="clash-score-box">${scoreHtml}</div>
        <div class="clash-team right">${teamCrest(m._a,'crest')}<div class="clash-name">${m._a}</div></div>
      </div>
      <div class="clash-body">
        <div class="clash-people">
          <div class="clash-col">${hs.people.map(p=>`• ${p}`).join('<br>')}</div>
          <div class="clash-col right">${as.people.map(p=>`${p} •`).join('<br>')}</div>
        </div>
        ${result}
        <div class="clash-stage">${KO_LONG[m.stage]||m.stage}</div>
      </div></div>`;
  };

  document.getElementById('content').innerHTML=
    `<div class="sec-hdr">⚔️ Syndicate Clashes — ${clashes.length}</div>`+clashes.map(makeClash).join('');
}

// ── RENDER: ALL TEAMS ─────────────────────────────────────────────────────────
function showAllTeams() {
  if (!lastState) return;
  activeTab = 'allteams';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('stat-all').classList.add('filter-active');
  activeFilter=null; ['in','tbd','out'].forEach(x=>document.getElementById('stat-'+x)?.classList.remove('filter-active'));
  clearSearch();
  renderAllTeams(lastState);
}

function renderAllTeams(st) {
  const isOut=e=>e.status.code.startsWith('OUT_');
  const entries=SYNDICATE.map(s=>({...s,status:resolveStatus(s.team,st)}));
  entries.sort((a,b)=>(SORT_ORDER[a.status.code]??99)-(SORT_ORDER[b.status.code]??99));

  const makeRow = e => {
    const sc=(lastScorers[e.team]||[]).slice(0,3);
    const scStr=sc.length ? sc.map(s=>`${s.player} ${s.goals}g`).join(' · ') : '';
    return `
      <div class="at-row${isOut(e)?' eliminated':''}" onclick="showModal('${escQ(e.team)}')">
        <div>${teamCrest(e.team)}</div>
        <div class="at-info">
          <div class="at-name">${e.team}</div>
          <div class="at-colleagues">${e.people.join(' · ')}</div>
          ${scStr?`<div class="at-scorers">⚽ ${scStr}</div>`:''}
        </div>
        <div class="badge ${e.status.badge}">${e.status.label}</div>
      </div>`;
  };

  const inL=entries.filter(e=>!isOut(e)), outL=entries.filter(isOut);
  let html='';
  if(inL.length)  html+=`<div class="sec-hdr">🟢 Still In — ${inL.length}</div>`+inL.map(makeRow).join('');
  if(outL.length) html+=`<div class="sec-hdr">❌ Eliminated — ${outL.length}</div>`+outL.map(makeRow).join('');
  document.getElementById('content').innerHTML=html;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function switchModalTab(tab) {
  modalTab = tab;
  document.querySelectorAll('.modal-tab').forEach((b,i) =>
    b.classList.toggle('active',['overview','matches','squad'][i]===tab));
  document.getElementById('m-panel-overview').style.display = tab==='overview' ? '' : 'none';
  document.getElementById('m-panel-matches').style.display  = tab==='matches'  ? '' : 'none';
  document.getElementById('m-panel-squad').style.display    = tab==='squad'    ? '' : 'none';
}

function showModal(team) {
  if (!lastState) return;
  const s=TEAM_MAP[team]; if (!s) return;
  clearSearch();
  modalTeam = team;
  modalTab  = 'overview';

  const status = resolveStatus(team, lastState);
  const pts    = POINTS[status.code]||0;
  const td     = lastTeams[team] || {};
  const color  = td.color || '#1a3050';

  // Band styling
  const band = document.getElementById('m-band');
  band.style.background = color + '33';
  document.getElementById('modal').style.borderTopColor = color;

  // Crest
  const crestEl = document.getElementById('m-crest');
  if (td.logo) { crestEl.src=td.logo; crestEl.style.display=''; }
  else { crestEl.style.display='none'; }

  document.getElementById('m-name').textContent = team;
  document.getElementById('m-sub').innerHTML =
    `<span class="badge ${status.badge}">${status.label}</span>` +
    `<span class="pts-badge pts-${pts}" style="display:inline-block;min-width:0;padding:2px 7px">${pts} pts</span>` +
    (td.form ? formDots(td.form) : '');

  // Switch to overview
  switchModalTab('overview');

  // Squad tab visibility
  document.getElementById('m-squad-tab').style.display = lastSquads[team] ? '' : 'none';

  // ── OVERVIEW ────────────────────────────────────────────────────────────────
  // Progress strip
  const code=status.code;
  const sr={CHAMPION:5,OUT_FINAL:5,IN_SEMI:5,OUT_SEMI:4,OUT_3RD:4,IN_QUARTER:4,OUT_QUARTER:3,IN_R16:3,OUT_R16:2,IN_R32:2,OUT_R32:1,QUALIFIED:1,GROUP:0,TBD:0,OUT_GROUP:-1,UNKNOWN:-1}[code]??0;
  const isElim=code.startsWith('OUT_');
  const items=[];
  STAGE_LIST.forEach((stage,i)=>{
    const reached=i<=sr, current=i===sr&&!isElim, elimHere=isElim&&i===sr;
    const sc=elimHere?'eliminated':reached&&!current?'done':current?'current':'future';
    const lc=i<sr?'done':'future';
    if(i>0) items.push(`<div class="ps-line ${lc}"></div>`);
    items.push(`<div class="ps-step ${sc}"><div class="ps-circle">${elimHere?'✕':reached?'✓':i+1}</div><div class="ps-label">${stage.label}</div></div>`);
  });
  document.getElementById('m-progress').innerHTML=items.join('');

  // Stats
  const ms=(lastState.matchesByTeam[team]||[]).filter(m=>m.status==='FINISHED');
  let gf=0,ga=0,w=0,d=0,l=0;
  for (const m of ms) {
    if(m._h===team){gf+=m.homeScore;ga+=m.awayScore;}else{gf+=m.awayScore;ga+=m.homeScore;}
    const ic=matchIcon(m,team); if(ic==='✅')w++;else if(ic==='❌')l++;else d++;
  }
  const gd=gf-ga;
  document.getElementById('m-stats').innerHTML=`
    <div class="stat-box"><div class="stat-box-num">${w}</div><div class="stat-box-lbl">Won</div></div>
    <div class="stat-box"><div class="stat-box-num">${d}</div><div class="stat-box-lbl">Drawn</div></div>
    <div class="stat-box"><div class="stat-box-num">${l}</div><div class="stat-box-lbl">Lost</div></div>
    <div class="stat-box"><div class="stat-box-num">${gf}</div><div class="stat-box-lbl">Scored</div></div>
    <div class="stat-box"><div class="stat-box-num">${ga}</div><div class="stat-box-lbl">Conceded</div></div>
    <div class="stat-box"><div class="stat-box-num ${gd>=0?'pos-num':'neg-num'}">${gd>=0?'+':''}${gd}</div><div class="stat-box-lbl">GD</div></div>`;

  // Scorers
  const sc=(lastScorers[team]||[]);
  const scsec=document.getElementById('m-scorers-sec'), scdiv=document.getElementById('m-scorers-div');
  if (sc.length) {
    document.getElementById('m-scorers-table').innerHTML=
      `<tr><th>Player</th><th style="text-align:right">Goals</th><th style="text-align:right">Assists</th></tr>`+
      sc.map(x=>`<tr><td>${x.player}</td><td class="sc-goals">${x.goals}</td><td class="sc-assists">${x.assists||0}</td></tr>`).join('');
    scsec.style.display=''; scdiv.style.display='';
  } else { scsec.style.display='none'; scdiv.style.display='none'; }

  // Next fixture
  const upcoming=(lastState.matchesByTeam[team]||[]).find(m=>m.status==='SCHEDULED'||m.status==='TIMED');
  const nsec=document.getElementById('m-next-sec'), ndiv=document.getElementById('m-next-div');
  if (upcoming) {
    const opp=upcoming._h===team?upcoming._a:upcoming._h, oe=TEAM_MAP[opp];
    document.getElementById('m-next').innerHTML=
      `<div class="nf-label">${KO_LONG[upcoming.stage]||'Group Stage'}</div>`+
      `${teamCrest(opp,'crest-sm')} <strong>vs ${opp}</strong> — ${fmtDT(upcoming.utcDate)}`;
    nsec.style.display=''; ndiv.style.display='';
  } else { nsec.style.display='none'; ndiv.style.display='none'; }

  document.getElementById('m-colleagues').innerHTML=s.people.map(p=>`• ${p}`).join('<br>');

  // ── MATCHES TAB ─────────────────────────────────────────────────────────────
  const allMs=(lastState.matchesByTeam[team]||[]);
  const matchHtml = allMs.length ? allMs.map(m=>{
    const opp=m._h===team?m._a:m._h;
    const stageLbl=m.stage==='GROUP_STAGE'?`Group ${(m.group||'').replace('GROUP_','')}`:(KO_SHORT[m.stage]||m.stage);
    const teamColor_ = lastTeams[team]?.color||'#27ae60';
    const oppColor   = lastTeams[opp]?.color||'#4a6a80';

    // Events for this match
    const goals  = (m.events||[]).filter(e=>e.type==='goal');
    const reds   = (m.events||[]).filter(e=>e.type==='redcard');
    const teamGoals = goals.filter(e=>norm(e.team)===team);
    const oppGoals  = goals.filter(e=>norm(e.team)===opp);
    const evHtml = (m.status==='FINISHED'&&goals.length) ? `
      <div class="event-list">
        ${goals.map(e=>{
          const isTeam=norm(e.team)===team;
          const type=e.ownGoal?' (OG)':e.penalty?' (pen)':e.header?' (hdr)':'';
          return `<div class="event-row">
            <span class="ev-min">${e.minute}</span>
            <span class="ev-icon">⚽</span>
            <span class="ev-player">${e.player}${type}</span>
            <span class="ev-team-dot" style="background:${isTeam?teamColor_:oppColor}"></span>
          </div>`;
        }).join('')}
        ${reds.map(e=>{
          const isTeam=norm(e.team)===team;
          return `<div class="event-row">
            <span class="ev-min">${e.minute}</span>
            <span class="ev-icon">🟥</span>
            <span class="ev-player">${e.player}</span>
            <span class="ev-team-dot" style="background:${isTeam?teamColor_:oppColor}"></span>
          </div>`;
        }).join('')}
      </div>` : '';

    // Possession bar
    const mst=m.stats||{};
    const tst=mst[team], ost=mst[opp];
    const possHtml = (m.status==='FINISHED'&&tst?.possession) ? `
      <div class="poss-bar-wrap">
        <div class="poss-label">
          <span style="color:${teamColor_}">${tst.possession}%</span>
          <span style="color:#7a9ab0;font-size:.65rem">possession</span>
          <span style="color:${oppColor}">${ost?.possession||0}%</span>
        </div>
        <div class="poss-bar">
          <div class="poss-bar-fill" style="width:${tst.possession}%;background:${teamColor_}"></div>
        </div>
      </div>
      <div class="match-stat-row">
        <span class="ms-val">${tst.shots}</span>
        <span class="ms-label">Shots</span>
        <span class="ms-val">${ost?.shots||0}</span>
      </div>
      <div class="match-stat-row">
        <span class="ms-val">${tst.shotsOnTarget}</span>
        <span class="ms-label">On Target</span>
        <span class="ms-val">${ost?.shotsOnTarget||0}</span>
      </div>` : '';

    return `<div class="modal-match">
      <span class="mm-date">${fmtDate(m.utcDate)}</span>
      <div class="mm-body">
        <div class="mm-matchup">
          ${teamCrest(opp,'crest-sm')} <span>vs ${opp}</span>
          <span class="mm-stage" style="margin-left:4px">${stageLbl}</span>
        </div>
        ${evHtml}
        ${possHtml}
        ${m.headline?`<div class="mm-headline">${m.headline}</div>`:''}
        ${m.attendance?`<div class="mm-attendance">👥 ${m.attendance.toLocaleString()}</div>`:''}
      </div>
      <span class="mm-score">${teamScore(m,team)}</span>
      <span class="mm-icon">${matchIcon(m,team)}</span>
    </div>`;
  }).join('') : '<div style="color:rgba(255,255,255,.3);font-size:.8rem;padding:8px 0">No fixtures yet</div>';
  document.getElementById('m-matches').innerHTML=matchHtml;

  // ── SQUAD TAB ───────────────────────────────────────────────────────────────
  const squad=lastSquads[team];
  if (squad) {
    const scorerMap={};
    (lastScorers[team]||[]).forEach(s => { scorerMap[s.player]={goals:s.goals,assists:s.assists||0}; });

    const byPos={'GK':[],'DEF':[],'MID':[],'FWD':[],'?':[]};
    squad.forEach(p => (byPos[p.position]||byPos['?']).push(p));

    const posLabel={'GK':'Goalkeepers','DEF':'Defenders','MID':'Midfielders','FWD':'Forwards','?':'Others'};
    let squadHtml='';
    for (const pos of ['GK','DEF','MID','FWD','?']) {
      const players=byPos[pos]; if(!players.length) continue;
      squadHtml+=`<div class="squad-pos-hdr">${posLabel[pos]}</div>`;
      squadHtml+=players.map(p=>{
        const sc=scorerMap[p.name]||scorerMap[p.name.split(' ').pop()];
        const scStr=sc?`${sc.goals>0?sc.goals+'⚽':''}${sc.assists>0?' '+sc.assists+'🅰️':''}`.trim():'';
        return `<div class="squad-row">
          <span class="squad-shirt">${p.shirt||'—'}</span>
          <span class="squad-name">${p.name}</span>
          ${scStr?`<span class="squad-goals">${scStr}</span>`:''}
        </div>`;
      }).join('');
    }
    document.getElementById('m-squad').innerHTML=squadHtml;
  } else {
    document.getElementById('m-squad').innerHTML=`<div style="color:rgba(255,255,255,.3);font-size:.8rem;padding:12px 0;text-align:center">Run fetch_squads.py to load squad data</div>`;
  }

  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) { if(e.target===document.getElementById('overlay')) closeModalForce(); }
function closeModalForce() { document.getElementById('overlay').classList.remove('open'); }

// ── BANNER & STATS ────────────────────────────────────────────────────────────
function renderBanner(st) {
  const b=document.getElementById('next-banner');
  const live=st.allMatches.filter(m=>(m.status==='IN_PLAY'||m.status==='PAUSED')&&(SYND_TEAMS.has(norm(m.home))||SYND_TEAMS.has(norm(m.away))));
  if (live.length) {
    const m=live[0], h=TEAM_MAP[norm(m.home)], a=TEAM_MAP[norm(m.away)];
    b.innerHTML=`🔴 LIVE: <strong>${h?.flag||''}${norm(m.home)} ${m.homeScore}–${m.awayScore} ${norm(m.away)}${a?.flag||''}</strong>`;
    b.style.display='block'; return;
  }
  const next=st.allMatches
    .filter(m=>(m.status==='SCHEDULED'||m.status==='TIMED')&&(SYND_TEAMS.has(norm(m.home))||SYND_TEAMS.has(norm(m.away))))
    .sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate))[0];
  if (next) {
    const h=TEAM_MAP[norm(next.home)],a=TEAM_MAP[norm(next.away)];
    b.innerHTML=`📅 Next: <strong>${h?.flag||''} ${norm(next.home)} vs ${norm(next.away)} ${a?.flag||''}</strong> — ${fmtDT(next.utcDate)}`;
    b.style.display='block';
  } else { b.style.display='none'; }
}

function renderStats(st) {
  const codes=SYNDICATE.map(s=>resolveStatus(s.team,st).code);
  document.getElementById('sn-all').textContent=SYNDICATE.length;
  document.getElementById('sn-in').textContent=codes.filter(c=>!c.startsWith('OUT_')&&c!=='TBD').length;
  document.getElementById('sn-tbd').textContent=codes.filter(c=>c==='TBD').length;
  document.getElementById('sn-out').textContent=codes.filter(c=>c.startsWith('OUT_')).length;
  document.getElementById('live-label').innerHTML=st.liveCount>0?`Auto-updating <span class="live-pill">LIVE</span>`:'Auto-updating';
}

// ── FETCH & UPDATE ────────────────────────────────────────────────────────────
async function update() {
  try {
    let matches, rawScorers=[], rawTeams={};
    if (USE_JSON) {
      const res=await fetch(`${DATA_URL}?_=${Date.now()}`);
      if (!res.ok) throw new Error(`Could not load ${DATA_URL} (${res.status})`);
      const data=await res.json();
      matches=data.matches; rawScorers=data.scorers||[]; rawTeams=data.teams||{};
    } else {
      const res=await fetch(`${HA_URL}/api/states/${HA_SENSOR}`,{headers:{'Authorization':`Bearer ${HA_TOKEN}`}});
      if (!res.ok) throw new Error(`HA API returned ${res.status}.`);
      const data=await res.json();
      matches=data.attributes?.matches;
    }
    if (!Array.isArray(matches)) throw new Error('Match data is missing or invalid.');

    // Build scorersByTeam
    lastScorers={};
    for (const s of rawScorers) {
      const t=norm(s.team);
      if (!lastScorers[t]) lastScorers[t]=[];
      lastScorers[t].push(s);
    }
    // Build teamsMeta by normName
    lastTeams={};
    for (const [rawName,meta] of Object.entries(rawTeams)) {
      lastTeams[norm(rawName)] = meta;
    }

    lastState=processMatches(matches);
    renderStats(lastState);
    renderBanner(lastState);
    renderCurrentTab();

    document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('error-msg').style.display='none';
  } catch(err) {
    const el=document.getElementById('error-msg');
    el.style.display='block'; el.textContent='⚠️ '+err.message;
    document.getElementById('last-updated').textContent='Update failed';
    console.error('[wc2026]',err);
  }
}

// Load squads (non-blocking, optional)
async function loadSquads() {
  try {
    const res=await fetch(`${SQUADS_URL}?_=${Date.now()}`);
    if (!res.ok) return;
    const data=await res.json();
    lastSquads={};
    for (const [rawName,squad] of Object.entries(data.squads||{})) {
      lastSquads[norm(rawName)]=squad;
    }
    console.log(`[wc2026] Loaded squads for ${Object.keys(lastSquads).length} teams`);
  } catch(e) { /* squads.json not yet available — that's fine */ }
}

update();
loadSquads();
setInterval(update, REFRESH_MS);
