<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>⚽ Coughlans World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Karma:wght@600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⚽%3C/text%3E%3C/svg%3E">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #040810;
  min-height: 100vh;
  color: #e8edf5;
}
/* Stadium spotlight atmosphere */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 45% at 10% 5%,  rgba(120,0,220,.22) 0%, transparent 100%),
    radial-gradient(ellipse 70% 45% at 90% 5%,  rgba(0,60,220,.18) 0%, transparent 100%),
    radial-gradient(ellipse 90% 55% at 50% 110%, rgba(0,120,40,.28) 0%, transparent 100%);
  pointer-events: none; z-index: 0;
}
/* Subtle pitch stripe texture */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    90deg, transparent 0px, transparent 99px,
    rgba(255,255,255,.008) 99px, rgba(255,255,255,.008) 100px
  );
  pointer-events: none; z-index: 0;
}
#content, nav, .search-wrap, #next-banner, #inapp-banner,
#error-msg, #progress-bar-wrap, .stats-bar { position: relative; z-index: 1; }

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, rgba(10,40,20,.98) 0%, rgba(5,10,28,.98) 100%);
  padding: 13px 16px 11px;
  border-bottom: 1px solid rgba(39,174,96,.4);
  box-shadow: 0 4px 40px rgba(0,0,0,.4), 0 0 80px rgba(39,174,96,.05);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -.4px; cursor: pointer; line-height: 1.1; font-family: 'Karma', serif; color: #F7DB8D; transform: scaleX(1.2); transform-origin: left; display: inline-block; }
.header-sub { font-size: .62rem; color: rgba(255,255,255,.38); margin-top: 2px; letter-spacing: .2px; }
.header-right { text-align: right; }
#live-label { font-size: .68rem; color: rgba(255,255,255,.5); }
#last-updated { font-size: .62rem; color: rgba(255,255,255,.3); margin-top: 2px; }
.live-pill { display: inline-block; background: #c0392b; color: #fff; font-size: .58rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: .5px; margin-left: 4px; animation: blink 1s infinite; vertical-align: middle; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── BANNERS ── */
#inapp-banner { display: none; background: rgba(0,0,0,.5); backdrop-filter: blur(10px); padding: 7px 14px; font-size: .72rem; color: rgba(255,255,255,.55); border-bottom: 1px solid rgba(255,255,255,.07); text-align: center; cursor: pointer; }
#next-banner { display: none; background: rgba(0,0,0,.4); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,.07); padding: 7px 14px; font-size: .75rem; color: rgba(255,255,255,.5); }
#next-banner strong { color: #e8edf5; }

/* ── STATS BAR ── */
.stats-bar { display: flex; background: rgba(0,0,0,.45); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,.07); }
.stat { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px; border-right: 1px solid rgba(255,255,255,.07); transition: background .15s; }
.stat:last-child { border-right: none; }
.stat.clickable { cursor: pointer; }
.stat.clickable:hover { background: rgba(255,255,255,.07); }
.stat.filter-active { background: rgba(46,204,113,.1); border-top: 2px solid #2ecc71; }
.stat-num { font-size: 1.1rem; font-weight: 800; line-height: 1; }
.stat-lbl { font-size: .58rem; color: rgba(255,255,255,.5); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
.c-in{color:#2ecc71} .c-tbd{color:#f39c12} .c-out{color:#e74c3c} .c-all{color:rgba(255,255,255,.45)}

/* ── SEARCH ── */
.search-wrap { position: relative; padding: 8px 14px; background: rgba(0,0,0,.35); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,.07); }
#search-input { width: 100%; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; padding: 8px 34px 8px 12px; color: #e8edf5; font-size: .82rem; outline: none; }
#search-input::placeholder { color: rgba(255,255,255,.28); }
#search-input:focus { border-color: rgba(46,204,113,.5); background: rgba(255,255,255,.09); }
#search-clear { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,.35); font-size: 1rem; cursor: pointer; padding: 0 4px; display: none; }
#search-clear:hover { color: #e8edf5; }

/* ── TABS ── */
.tab-bar { display: flex; background: rgba(0,0,0,.55); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,.07); position: sticky; top: 46px; z-index: 99; }
.tab-btn { flex: 1; background: none; border: none; cursor: pointer; padding: 10px 4px; font-size: .76rem; color: rgba(255,255,255,.55); font-family: inherit; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; white-space: nowrap; }
.tab-btn.active { color: #2ecc71; border-bottom-color: #2ecc71; }
.tab-btn:hover:not(.active) { color: rgba(255,255,255,.8); }

/* ── SECTION HEADER ── */
.sec-hdr { padding: 7px 14px; font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(255,255,255,.55); background: rgba(0,0,0,.35); backdrop-filter: blur(6px); border-bottom: 1px solid rgba(255,255,255,.06); border-top: 1px solid rgba(255,255,255,.06); margin-top: 6px; }
.sec-hdr:first-child { margin-top: 0; }

/* ── CREST ── */
.crest { width: 32px; height: 32px; object-fit: contain; flex-shrink: 0; }
.crest-sm { width: 22px; height: 22px; object-fit: contain; }
.crest-lg { width: 52px; height: 52px; object-fit: contain; }

/* ── LEADERBOARD ROW ── */
.lb-row { display: grid; grid-template-columns: 28px 34px 1fr auto; gap: 8px; align-items: center; padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.05); cursor: pointer; transition: background .15s; }
.lb-row:hover { background: rgba(255,255,255,.05); }
.lb-row.eliminated { opacity: .32; }
.lb-row.rank-gold   { background: linear-gradient(90deg, rgba(241,196,15,.14) 0%, transparent 70%); border-left: 3px solid #f1c40f; }
.lb-row.rank-silver { background: linear-gradient(90deg, rgba(189,195,199,.09) 0%, transparent 70%); border-left: 3px solid #bdc3c7; }
.lb-row.rank-bronze { background: linear-gradient(90deg, rgba(205,127,50,.09) 0%, transparent 70%); border-left: 3px solid #cd7f32; }
.lb-row.rank-gold:hover   { background: linear-gradient(90deg, rgba(241,196,15,.22) 0%, rgba(255,255,255,.03) 70%); }
.lb-row.rank-silver:hover { background: linear-gradient(90deg, rgba(189,195,199,.15) 0%, rgba(255,255,255,.03) 70%); }
.lb-row.rank-bronze:hover { background: linear-gradient(90deg, rgba(205,127,50,.15) 0%, rgba(255,255,255,.03) 70%); }
.lb-rank { font-size: .9rem; font-weight: 800; color: rgba(255,255,255,.3); text-align: center; }
.lb-rank.gold{color:#f1c40f} .lb-rank.silver{color:#bdc3c7} .lb-rank.bronze{color:#cd7f32}
.lb-info { min-width: 0; }
.lb-name { font-size: .92rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-team { font-size: .7rem; color: rgba(255,255,255,.6); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
.pts-badge { font-size: .72rem; font-weight: 700; padding: 4px 8px; border-radius: 10px; white-space: nowrap; min-width: 52px; text-align: center; }
.pts-0{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.08)}
.pts-1{background:rgba(59,143,212,.15);color:#6bb8f0;border:1px solid rgba(59,143,212,.3)}
.pts-2,.pts-3{background:rgba(46,204,113,.12);color:#2ecc71;border:1px solid rgba(46,204,113,.35)}
.pts-4,.pts-5{background:rgba(139,195,74,.12);color:#a5d86e;border:1px solid rgba(139,195,74,.3)}
.pts-6{background:rgba(243,156,18,.12);color:#f39c12;border:1px solid rgba(243,156,18,.3)}
.pts-7{background:rgba(241,196,15,.15);color:#ffd700;border:1px solid rgba(241,196,15,.4)}

/* ── FORM DOTS ── */
.form-dots { display: inline-flex; gap: 2px; align-items: center; }
.form-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── TEAM ROW ── */
.team-row { display: grid; grid-template-columns: 36px 1fr auto 18px; gap: 10px; align-items: center; padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.05); cursor: pointer; transition: background .15s; }
.team-row:hover { background: rgba(255,255,255,.05); }
.team-row.eliminated { opacity: .32; }
.team-info { min-width: 0; }
.team-name { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-people { font-size: .7rem; color: rgba(255,255,255,.38); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chev { color: rgba(255,255,255,.25); font-size: .7rem; transition: transform .2s; }
.chev.open { transform: rotate(90deg); }

/* ── EXPAND ── */
.expand { display: none; background: rgba(0,0,0,.4); backdrop-filter: blur(6px); border-bottom: 1px solid rgba(255,255,255,.05); padding: 10px 14px 12px 60px; }
.expand.open { display: block; }
.ex-match { display: flex; gap: 8px; font-size: .73rem; padding: 3px 0; color: rgba(255,255,255,.55); align-items: center; }
.ex-date { color: rgba(255,255,255,.28); min-width: 52px; }
.ex-vs { flex: 1; }
.ex-score { font-weight: 700; min-width: 36px; text-align: right; }
.ex-icon { min-width: 18px; text-align: right; }
.ex-btn { display: block; margin-top: 10px; width: 100%; background: rgba(46,204,113,.1); border: 1px solid rgba(46,204,113,.35); color: #2ecc71; padding: 8px 12px; border-radius: 8px; font-size: .8rem; font-weight: 700; cursor: pointer; font-family: inherit; text-align: center; transition: background .15s; }
.ex-btn:hover { background: rgba(46,204,113,.2); }

/* ── ALL TEAMS VIEW ── */
.at-row { display: grid; grid-template-columns: 36px 1fr auto; gap: 10px; align-items: center; padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.05); cursor: pointer; transition: background .15s; }
.at-row:hover { background: rgba(255,255,255,.05); }
.at-row.eliminated { opacity: .32; }
.at-info { min-width: 0; }
.at-name { font-size: .88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.at-colleagues { font-size: .68rem; color: rgba(255,255,255,.38); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.at-scorers { font-size: .68rem; color: #f39c12; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── CLASHES ── */
.clash-card { margin: 10px 14px; border-radius: 10px; border: 1px solid #1a3050; overflow: hidden; }
.clash-hype { padding: 8px 14px; font-size: .8rem; font-weight: 600; text-align: center; border-bottom: 1px solid rgba(255,255,255,.08); letter-spacing: .3px; }
.clash-hype.live { background: rgba(192,57,43,.2); color: #ff6b6b; animation: blink 1.5s infinite; }
.clash-hype.upcoming { background: rgba(39,174,96,.08); color: #5dde8a; }
.clash-hype.done-win { background: rgba(0,0,0,.2); color: #e8edf5; }
.clash-hype.done-loss { background: rgba(0,0,0,.2); color: #7a9ab0; }

/* ── GROUPS VIEW ── */
.groups-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 10px; padding: 10px 12px 20px; }
.group-card { background: rgba(0,0,0,.3); backdrop-filter: blur(10px); border-radius: 10px; border: 1px solid rgba(255,255,255,.08); overflow: hidden; }
.group-card-title { padding: 8px 12px; font-size: .82rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,.07); letter-spacing: .3px; }
.group-hdr-row { display: grid; grid-template-columns: 18px 26px 1fr 20px 20px 20px 26px 26px; gap: 3px; align-items: center; padding: 4px 10px; font-size: .6rem; color: rgba(255,255,255,.35); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid rgba(255,255,255,.06); }
.group-team-row { display: grid; grid-template-columns: 18px 26px 1fr 20px 20px 20px 26px 26px; gap: 3px; align-items: center; padding: 6px 10px; font-size: .73rem; border-bottom: 1px solid rgba(255,255,255,.04); cursor: pointer; transition: background .12s; }
.group-team-row:hover { background: rgba(255,255,255,.05); }
.group-team-row:last-child { border-bottom: none; }
.group-team-row.through { border-left: 3px solid #2ecc71; padding-left: 7px; background: rgba(46,204,113,.04); }
.group-team-row.pending-third { border-left: 3px solid #f39c12; padding-left: 7px; }
.group-team-row.eliminated { opacity: .38; }
.gtr-pos { color: rgba(255,255,255,.4); text-align: center; font-size: .68rem; }
.gtr-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gtr-num { text-align: right; color: rgba(255,255,255,.55); }
.gtr-gd { text-align: right; font-weight: 600; }
.gtr-pts { text-align: right; font-weight: 800; color: #e8edf5; }
.live-card { margin: 10px 14px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,.09); background: rgba(0,0,0,.3); backdrop-filter: blur(12px); }
.live-card.is-live { border-color: rgba(192,57,43,.45); box-shadow: 0 0 24px rgba(192,57,43,.1); }
.live-card.is-upcoming { border-color: rgba(59,143,212,.25); }
.live-card-hdr { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; font-size: .7rem; color: rgba(255,255,255,.6); border-bottom: 1px solid rgba(255,255,255,.06); }
.live-badge-big { background: #c0392b; color: #fff; font-size: .62rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; animation: blink 1s infinite; }
.finished-badge { background: rgba(255,255,255,.1); color: rgba(255,255,255,.6); font-size: .62rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
.upcoming-badge { background: rgba(59,143,212,.2); color: #7ac4f8; font-size: .62rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; }

/* ── LIVE BANNER STATES ── */
#next-banner { display: none; background: rgba(0,0,0,.4); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,.07); padding: 7px 14px; font-size: .78rem; color: rgba(255,255,255,.6); cursor: pointer; transition: background .2s; }
#next-banner strong { color: #e8edf5; }
#next-banner:hover { background: rgba(255,255,255,.06); }
#next-banner.is-live { background: rgba(150,20,20,.35); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(220,50,50,.3); padding: 10px 14px; font-size: .85rem; font-weight: 600; animation: none; box-shadow: 0 2px 20px rgba(192,57,43,.2); }
#next-banner.is-live strong { color: #fff; }
.live-score-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; padding: 16px 14px 10px; }
.live-team { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
.live-team:hover .live-team-name { color: #2ecc71; }
.live-team-name { font-size: .85rem; font-weight: 700; text-align: center; transition: color .15s; }
.live-score-box { text-align: center; }
.live-score { font-size: 2.6rem; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.live-score.is-live { color: #ffffff; text-shadow: 0 0 20px rgba(255,255,255,.15); }
.live-colleagues { font-size: .64rem; color: rgba(255,255,255,.45); text-align: center; margin-top: 3px; max-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.live-events { padding: 4px 14px 6px; }
.live-ev { display: flex; gap: 8px; font-size: .75rem; padding: 4px 0; color: rgba(255,255,255,.7); border-bottom: 1px solid rgba(255,255,255,.04); align-items: center; }
.live-ev:last-child { border-bottom: none; }
.live-ev-min { color: rgba(255,255,255,.4); min-width: 32px; font-size: .7rem; }
.live-ev-icon { min-width: 16px; }
.live-ev-player { flex: 1; }
.live-ev-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.live-stats { padding: 6px 14px 12px; }
.live-poss-lbl { display: flex; justify-content: space-between; font-size: .68rem; margin-bottom: 3px; color: rgba(255,255,255,.55); }
.live-poss-bar { height: 5px; background: rgba(255,255,255,.07); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.live-poss-fill { height: 100%; border-radius: 3px; }
.live-stat-r { display: flex; font-size: .72rem; color: rgba(255,255,255,.55); margin: 3px 0; }
.lsv { min-width: 28px; font-weight: 700; color: #e8edf5; }
.lsv.r { text-align: right; }
.lsl { flex: 1; text-align: center; color: rgba(255,255,255,.38); }
.clash-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: #0d1f35; padding: 10px 14px; gap: 8px; }
.clash-team { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.clash-team.right { align-items: flex-end; }
.clash-flag { font-size: 1.4rem; line-height: 1; }
.clash-name { font-size: .82rem; font-weight: 700; text-align: center; }
.clash-team.right .clash-name { text-align: right; }
.clash-score-box { text-align: center; }
.clash-score { font-size: 1.3rem; font-weight: 800; line-height: 1; }
.clash-score.live { color: #e74c3c; }
.clash-date { font-size: .65rem; color: #7a9ab0; margin-top: 2px; white-space: nowrap; }
.clash-body { padding: 8px 14px; background: #081422; }
.clash-people { display: flex; }
.clash-col { flex: 1; font-size: .7rem; color: #7a9ab0; line-height: 1.8; }
.clash-col.right { text-align: right; }
.clash-result { text-align: center; font-size: .7rem; margin-top: 6px; }
.clash-result.won { color: #27ae60; font-weight: 700; }
.clash-stage { font-size: .67rem; color: #4a6a80; text-align: center; margin-top: 4px; letter-spacing: .5px; text-transform: uppercase; }

/* ── BADGES ── */
.badge { font-size: .65rem; font-weight: 700; padding: 3px 7px; border-radius: 10px; white-space: nowrap; min-width: 72px; text-align: center; letter-spacing: .2px; }
.b-champion{background:#856404;color:#ffc107;border:1px solid #ffc107}
.b-in{background:#0d2a1a;color:#27ae60;border:1px solid #27ae60}
.b-group{background:#0d2035;color:#3b8fd4;border:1px solid #2a6fa8}
.b-tbd{background:#2d1f00;color:#f39c12;border:1px solid #b57206}
.b-out{background:#2a0d0d;color:#c0392b;border:1px solid #7a2020}

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 300; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: rgba(8,12,22,.96); backdrop-filter: blur(24px); width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; border-top: 1px solid rgba(255,255,255,.12); box-shadow: 0 -20px 60px rgba(0,0,0,.5); max-height: 86vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,.2); border-radius: 2px; margin: 10px auto 0; }

/* Modal team header band */
.modal-team-band { padding: 12px 16px 10px; display: flex; align-items: center; gap: 14px; }
.modal-team-text { flex: 1; min-width: 0; }
.modal-team-name { font-size: 1.15rem; font-weight: 700; }
.modal-team-sub { font-size: .72rem; color: #7a9ab0; margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.modal-close { background: rgba(0,0,0,.3); border: none; color: rgba(255,255,255,.7); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.modal-close:hover { background: rgba(0,0,0,.5); color: #fff; }

/* Modal tabs */
.modal-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,.1); }
.modal-tab { flex: 1; background: none; border: none; padding: 8px 4px; font-size: .75rem; color: rgba(255,255,255,.5); cursor: pointer; font-family: inherit; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.modal-tab.active { color: #fff; border-bottom-color: #fff; }

.modal-sec { padding: 8px 16px; }

.ps-step.done .ps-circle { background: rgba(255,255,255,.9); color: #0a1628; }

  'Cape Verde': 'cabo-verde',

  'Bosnia':     'bosnia-and-herzegovina',
};

function teamLogoPath(team) {
  const slug = LOGO_OVERRIDES[team] || team.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  return `${LOGO_FOLDER}/${slug}.png`;
}

function teamCrest(team, cls='crest') {
  const localPath = teamLogoPath(team);
  const espnUrl   = lastTeams[team]?.logo || '';
  const flag      = TEAM_MAP[team]?.flag || '⚽';
  const fallback  = espnUrl
    ? `this.onerror=null;this.src='${espnUrl}'`
    : `this.onerror=null;this.outerHTML='<span style=\\'font-size:1.4rem\\'>${flag}</span>'`;
  return `<img class="${cls}" src="${localPath}" alt="${team}" onerror="${fallback}">`;
}

function formDots(form) {
  if (!form) return '';
  return '<span class="form-dots">' +
    form.split('').slice(-5).map(r => {
      const c = r==='W'?'#27ae60':r==='L'?'#e74c3c':'#f39c12';
      return `<span class="form-dot" style="background:${c}" title="${r==='W'?'Win':r==='L'?'Loss':'Draw'}"></span>`;
    }).join('') + '</span>';
}

  if (m.status !== 'FINISHED') return m.status==='IN_PLAY'||m.status==='PAUSED' ? '🔴' : '📅';
  const won  = (m._h===team&&m.winner==='HOME_TEAM') || (m._a===team&&m.winner==='AWAY_TEAM');
  const lost = (m._h===team&&m.winner==='AWAY_TEAM') || (m._a===team&&m.winner==='HOME_TEAM');
  return won ? '✅' : lost ? '❌' : '🟰';
}
function teamScore(m, team) {
  if (m.status !== 'FINISHED') return '';
  return m._h===team ? `${m.homeScore}–${m.awayScore}` : `${m.awayScore}–${m.homeScore}`;
}

// ── PROCESS MATCHES ───────────────────────────────────────────────────────────
function processMatches(matches) {
  const groupStats={}, koRecord={}, groupMatchCounts={}, matchesByTeam={};

  for (const m of matches) {
    const h=norm(m.home), a=norm(m.away);
    for (const t of [h,a]) {
      if (!matchesByTeam[t]) matchesByTeam[t]=[];
      matchesByTeam[t].push({...m, _h:h, _a:a});
    }
  }
  for (const t in matchesByTeam)
    matchesByTeam[t].sort((a,b) => new Date(a.utcDate)-new Date(b.utcDate));

  for (const m of matches.filter(m => m.status==='FINISHED')) {
    const h=norm(m.home), a=norm(m.away);
    if (m.stage==='GROUP_STAGE') {
      groupMatchCounts[m.group] = (groupMatchCounts[m.group]||0)+1;
      for (const t of [h,a]) if (!groupStats[t]) groupStats[t]={group:m.group,gp:0,pts:0,gf:0,ga:0};
      groupStats[h].gp++; groupStats[a].gp++;
      groupStats[h].gf+=m.homeScore; groupStats[h].ga+=m.awayScore;
      groupStats[a].gf+=m.awayScore; groupStats[a].ga+=m.homeScore;
      if      (m.winner==='HOME_TEAM') { groupStats[h].pts+=3; }
      else if (m.winner==='AWAY_TEAM') { groupStats[a].pts+=3; }
      else                             { groupStats[h].pts+=1; groupStats[a].pts+=1; }
    } else {
      const winner=m.winner==='HOME_TEAM'?h:a, loser=m.winner==='HOME_TEAM'?a:h;
      if (!koRecord[winner]) koRecord[winner]={};
      koRecord[winner].stage=m.stage; koRecord[winner].won=true;
      if (!koRecord[loser])  koRecord[loser]={};
      koRecord[loser].stage=m.stage;  koRecord[loser].eliminated=true;
    }
  }

  const byGroup={};
  for (const [t,s] of Object.entries(groupStats)) {
    if (!byGroup[s.group]) byGroup[s.group]=[];
    byGroup[s.group].push({team:t,...s});
  }
  const groupRanks={};
  for (const [grp,teams] of Object.entries(byGroup)) {
    const isDone=(groupMatchCounts[grp]||0)>=6;
    teams.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:(b.gf-b.ga)!==(a.gf-a.ga)?(b.gf-b.ga)-(a.gf-a.ga):b.gf-a.gf);
    teams.forEach((t,i)=>{ groupRanks[t.team]={rank:i+1,groupDone:isDone,...t}; });
  }

  const completedGroups = Object.values(groupMatchCounts).filter(c=>c>=6).length;
  const allGroupsDone   = completedGroups >= 12;
  const bestThird       = new Set();
  if (allGroupsDone) {
    const thirds = Object.entries(groupRanks)
      .filter(([,r])=>r.rank===3&&r.groupDone)
      .map(([t,r])=>({team:t,pts:r.pts,gd:r.gf-r.ga,gf:r.gf}));
    thirds.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:b.gd!==a.gd?b.gd-a.gd:b.gf-a.gf);
    thirds.slice(0,8).forEach(t=>bestThird.add(t.team));
  }

  const liveCount=matches.filter(m=>m.status==='IN_PLAY'||m.status==='PAUSED').length;
  return {groupStats,koRecord,groupRanks,bestThird,allGroupsDone,matchesByTeam,liveCount,allMatches:matches};
}

// ── STATUS ────────────────────────────────────────────────────────────────────
function resolveStatus(team, st) {
  const {koRecord,groupRanks,groupStats,bestThird,allGroupsDone}=st;
  const ko=koRecord[team], gr=groupRanks[team], gs=groupStats[team];
  if (ko) {
    const s=ko.stage;
    if (s==='FINAL') {
      if (ko.won)        return {code:'CHAMPION', label:'🏆 Champion',  badge:'b-champion'};
      if (ko.eliminated) return {code:'OUT_FINAL',label:'🥈 Runner-Up', badge:'b-out'};
    }
    if (s==='THIRD_PLACE') {
      if (ko.won)        return {code:'OUT_SEMI', label:'🥉 3rd Place', badge:'b-in'};
      if (ko.eliminated) return {code:'OUT_3RD',  label:'4th Place',    badge:'b-out'};
    }
    const inM ={LAST_32:'IN_R32',LAST_16:'IN_R16',QUARTER_FINALS:'IN_QUARTER',SEMI_FINALS:'IN_SEMI'};
    const outM={LAST_32:'OUT_R32',LAST_16:'OUT_R16',QUARTER_FINALS:'OUT_QUARTER',SEMI_FINALS:'OUT_SEMI'};
    if (ko.eliminated) return {code:outM[s]||'OUT_GROUP',label:`❌ Out – ${KO_LONG[s]||s}`,badge:'b-out'};
    if (ko.won)        return {code:inM[s]||'QUALIFIED', label:`✅ ${KO_SHORT[s]}`,          badge:'b-in'};
  }
  if (gr) {
    if (gr.groupDone) {
      if (gr.rank<=2)   return {code:'QUALIFIED',label:'✅ Qualified',    badge:'b-in'};
      if (gr.rank===3)  {
        if (allGroupsDone) {
          if (bestThird.has(team)) return {code:'QUALIFIED',label:'✅ Best 3rd',   badge:'b-in'};
          else                     return {code:'OUT_GROUP', label:'❌ Out – Group',badge:'b-out'};
        }
        return {code:'TBD',label:'⏳ Best 3rd?',badge:'b-tbd'};
      }
      return {code:'OUT_GROUP',label:'❌ Out – Group',badge:'b-out'};
    }
    return {code:'GROUP',label:`⚽ Group (${gr.gp||0} played)`,badge:'b-group'};
  }
  if (gs?.gp>0) return {code:'GROUP',label:`⚽ Group (${gs.gp} played)`,badge:'b-group'};
  return {code:'GROUP',label:'⚽ Group Stage',badge:'b-group'};
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function onSearch(val) {

  const q = val.toLowerCase().trim();
  document.querySelectorAll('.lb-row,.team-row,.at-row').forEach(r => {

  });
}
function clearSearch() {

  document.getElementById('search-clear').style.display = 'none';

}

// ── FILTER ────────────────────────────────────────────────────────────────────
function toggleFilter(f) {
  if (activeTab==='allteams') switchTab('leaderboard');
  activeFilter = activeFilter===f ? null : f;
  ['in','tbd','out'].forEach(x =>
    document.getElementById('stat-'+x)?.classList.toggle('filter-active', activeFilter===x));
  clearSearch();
  if (lastState) renderCurrentTab();
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('stat-all').classList.remove('filter-active');
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active',['leaderboard','teamstats','groups','clashes'][i]===tab));
  clearSearch();
  if (lastState) renderCurrentTab();
}

function renderCurrentTab() {
  if      (activeTab==='leaderboard')  renderLeaderboard(lastState);
  else if (activeTab==='teamstats')    renderTeamStats(lastState);
  else if (activeTab==='groups')       renderGroups(lastState);
  else if (activeTab==='clashes')      renderClashes(lastState);
  else if (activeTab==='allteams')     renderAllTeams(lastState);
  else if (activeTab==='matchcentre')  renderMatchCentre(lastState);
}

// ── RENDER: LEADERBOARD ───────────────────────────────────────────────────────
function renderLeaderboard(st) {
  const isOut=p=>p.status.code.startsWith('OUT_'), isTBD=p=>p.status.code==='TBD';

  let people = SYNDICATE.flatMap(s => {
    const status=resolveStatus(s.team,st), pts=POINTS[status.code]||0;
    return s.people.map(name=>({name,team:s.team,flag:s.flag,status,pts}));
  });
  people.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:(SORT_ORDER[a.status.code]??99)-(SORT_ORDER[b.status.code]??99));
  let rank=1;
  people.forEach((p,i)=>{ if(i>0&&p.pts<people[i-1].pts) rank=i+1; p.rank=rank; });

  if      (activeFilter==='in')  people=people.filter(p=>!isOut(p)&&!isTBD(p));
  else if (activeFilter==='tbd') people=people.filter(isTBD);
  else if (activeFilter==='out') people=people.filter(isOut);

  const maxPts = people.length ? Math.max(...people.map(p=>p.pts), 0) : 0;
  const rankCls=r=>r===1?'gold':r===2?'silver':r===3?'bronze':'';
  // Only show medals when there's real differentiation (someone has > 1pt)
  const rankLbl=r=>{
    if (maxPts>=2&&r===1) return '🥇';
    if (maxPts>=2&&r===2) return '🥈';
    if (maxPts>=3&&r===3) return '🥉';
    return `#${r}`;
  };
  const form = team => lastTeams[team]?.form || '';

  const makeRow = p => {
    const rc = maxPts>=2 ? rankCls(p.rank) : '';
    return `
    <div class="lb-row${isOut(p)?' eliminated':''}${rc?' rank-'+rc:''}" onclick="showModal('${escQ(p.team)}')">
      <div class="lb-rank ${rc}">${rankLbl(p.rank)}</div>
      <div>${teamCrest(p.team)}</div>
      <div class="lb-info">
        <div class="lb-name">${p.name}</div>
        <div class="lb-team">${p.team} ${p.flag} ${formDots(form(p.team))}</div>
      </div>
      <div class="pts-badge pts-${p.pts}">Syn pts: ${p.pts}</div>
    </div>`;
  };

  const dot = c => `<span class="form-dot" style="background:${c};display:inline-block;margin:0 1px 0 5px;vertical-align:middle"></span>`;
  const FORM_KEY = `<span style="font-size:.58rem;color:rgba(255,255,255,.4);font-weight:400">${dot('#27ae60')}Wins${dot('#f39c12')}Draws${dot('#e74c3c')}Losses</span>`;
  const active=people.filter(p=>!isOut(p)&&!isTBD(p)), tbd=people.filter(isTBD), out=people.filter(isOut);
  let html='';
  if(active.length) html+=`<div class="sec-hdr">🟢 Still In — ${active.length} people ${FORM_KEY}</div>`+active.map(makeRow).join('');
  if(tbd.length)    html+=`<div class="sec-hdr">⏳ Best-Third TBD — ${tbd.length} people</div>`+tbd.map(makeRow).join('');
  if(out.length)    html+=`<div class="sec-hdr">❌ Eliminated — ${out.length} people</div>`+out.map(makeRow).join('');
  if(!html) html=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No results</div></div>`;
  document.getElementById('content').innerHTML=html;
}

// ── RENDER: TEAM STATS ────────────────────────────────────────────────────────
function renderTeamStats(st) {
  const isOut=e=>e.status.code.startsWith('OUT_'), isTBD=e=>e.status.code==='TBD';
  let entries=SYNDICATE.map(s=>({...s,status:resolveStatus(s.team,st)}));
  entries.sort((a,b)=>(SORT_ORDER[a.status.code]??99)-(SORT_ORDER[b.status.code]??99));

  if      (activeFilter==='in')  entries=entries.filter(e=>!isOut(e)&&!isTBD(e));
  else if (activeFilter==='tbd') entries=entries.filter(isTBD);
  else if (activeFilter==='out') entries=entries.filter(isOut);

  const makeRow = e => {
    const tid='ex_'+e.team.replace(/[^a-z0-9]/gi,'_');
    const ms=(st.matchesByTeam[e.team]||[]).filter(m=>m.status==='FINISHED');
    const recent=ms.slice(-2).map(m=>`
      <div class="ex-match">
        <span class="ex-date">${fmtDate(m.utcDate)}</span>
        <span class="ex-vs">vs ${m._h===e.team?m._a:m._h}</span>
        <span class="ex-score">${teamScore(m,e.team)}</span>
        <span class="ex-icon">${matchIcon(m,e.team)}</span>
      </div>`).join('');
    // Group stage points from standings
    const gr = st.groupRanks[e.team];
    const grPts = gr ? `<span style="font-size:.68rem;color:#7a9ab0;margin-left:5px">${gr.pts}pts</span>` : '';
    return `
      <div class="team-row${isOut(e)?' eliminated':''}" onclick="toggleExpand('${tid}')">
        <div>${teamCrest(e.team)}</div>
        <div class="team-info"><div class="team-name">${e.team}</div><div class="team-people">${e.people.join(' · ')}</div></div>
        <div style="text-align:right"><div class="badge ${e.status.badge}">${e.status.label}</div>${grPts}</div>
        <div class="chev" id="chev_${tid}">›</div>
      </div>
      <div class="expand" id="${tid}">
        ${recent||'<div class="ex-match" style="color:#4a6a80">No results yet</div>'}
        <button class="ex-btn" onclick="event.stopPropagation();showModal('${escQ(e.team)}')">📊 Full Stats, Scorers &amp; Squad</button>
      </div>`;
  };

  const inL=entries.filter(e=>!isOut(e)&&!isTBD(e)), tbdL=entries.filter(isTBD), outL=entries.filter(isOut);
  let html='';
  if(inL.length)  html+=`<div class="sec-hdr">🟢 Still In — ${inL.length}</div>`+inL.map(makeRow).join('');
  if(tbdL.length) html+=`<div class="sec-hdr">⏳ Best-Third TBD — ${tbdL.length}</div>`+tbdL.map(makeRow).join('');
  if(outL.length) html+=`<div class="sec-hdr">❌ Eliminated — ${outL.length}</div>`+outL.map(makeRow).join('');
  if(!html) html=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No results</div></div>`;
  document.getElementById('content').innerHTML=html;
}

function toggleExpand(tid) {
  document.getElementById(tid)?.classList.toggle('open');
  document.getElementById('chev_'+tid)?.classList.toggle('open');
}

// ── RENDER: GROUPS ────────────────────────────────────────────────────────────
function getWDL(team, st) {
  const ms=(st.matchesByTeam[team]||[]).filter(m=>m.status==='FINISHED'&&m.stage==='GROUP_STAGE');
  let w=0,d=0,l=0;
  for(const m of ms){
    const won=(m._h===team&&m.winner==='HOME_TEAM')||(m._a===team&&m.winner==='AWAY_TEAM');
    const lost=(m._h===team&&m.winner==='AWAY_TEAM')||(m._a===team&&m.winner==='HOME_TEAM');
    if(won)w++;else if(lost)l++;else if(m.winner==='DRAW')d++;
  }
  return {w,d,l};
}

function renderGroups(st) {
  // Build group map from groupStats
  const groupMap={};
  for(const [team,gs] of Object.entries(st.groupStats)){
    if(!groupMap[gs.group]) groupMap[gs.group]=[];
    const {w,d,l}=getWDL(team,st);
    const gr=st.groupRanks[team]||{};
    groupMap[gs.group].push({team,rank:gr.rank||99,gp:gs.gp,pts:gs.pts,gf:gs.gf,ga:gs.ga,w,d,l,groupDone:gr.groupDone||false});
  }
  for(const grp in groupMap) groupMap[grp].sort((a,b)=>a.rank-b.rank);
  const sortedGroups=Object.keys(groupMap).sort();

  if(!sortedGroups.length){
    document.getElementById('content').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Group data loading…</div><div class="empty-sub">Waiting for match results.</div></div>`;
    return;
  }

  const makeGroupCard=grp=>{
    const letter=grp.replace('GROUP_','');
    const teams=groupMap[grp];
    const isDone=teams.some(t=>t.groupDone);

    const headerRow=`<div class="group-hdr-row">
      <span></span><span></span><span>Team</span>
      <span style="text-align:right">P</span><span style="text-align:right">W</span><span style="text-align:right">D</span>
      <span style="text-align:right">GD</span><span style="text-align:right">Pts</span>
    </div>`;

    const rows=teams.map(t=>{
      const gd=t.gf-t.ga;
      const isThrough=isDone&&(t.rank<=2||(t.rank===3&&st.bestThird.has(t.team)));
      const isPending=t.rank===3&&isDone&&!st.allGroupsDone;
      const isElim=isDone&&(t.rank>=4||(t.rank===3&&st.allGroupsDone&&!st.bestThird.has(t.team)));
      const cls=isThrough?'through':isPending?'pending-third':isElim?'eliminated':'';
      const synd=TEAM_MAP[t.team];
      const hasSyndicate=!!synd;
      return `<div class="group-team-row ${cls}" onclick="showModal('${escQ(t.team)}')">
        <span class="gtr-pos">${t.rank}</span>
        <span>${teamCrest(t.team,'crest-sm')}</span>
        <span class="gtr-name" style="${hasSyndicate?'color:#e8edf5;font-weight:700':'color:rgba(255,255,255,.6)'}">${t.team}</span>
        <span class="gtr-num">${t.gp}</span>
        <span class="gtr-num">${t.w}</span>
        <span class="gtr-num">${t.d}</span>
        <span class="gtr-gd ${gd>0?'c-in':gd<0?'c-out':''}">${gd>0?'+':''}${gd}</span>
        <span class="gtr-pts">${t.pts}</span>
      </div>`;
    }).join('');

    const statusBadge=isDone
      ?`<span style="font-size:.6rem;color:#2ecc71;font-weight:700;margin-left:6px">✓ Complete</span>`
      :`<span style="font-size:.6rem;color:rgba(255,255,255,.35);margin-left:6px">${teams[0]?.gp||0}/3 played</span>`;

    return `<div class="group-card">
      <div class="group-card-title">Group ${letter}${statusBadge}</div>
      ${headerRow}${rows}
    </div>`;
  };

  const grid=`<div class="groups-grid">${sortedGroups.map(makeGroupCard).join('')}</div>`;
  const key=`<div class="sec-hdr">📋 All Groups · 🟢 Qualified · 🟡 Best-third pending · Syndicate teams in <strong style="color:#fff">bold</strong></div>`;
  document.getElementById('content').innerHTML=key+grid;
}

// ── RENDER: CLASHES ───────────────────────────────────────────────────────────
const CLASH_HYPE_UPCOMING = [
  (h,a,s) => `⚡ ${s} — only one of you makes it through.`,
  (h,a,s) => `😬 This is going to make the office very awkward.`,
  (h,a,s) => `🎯 All to play for. ${s} — no second chances.`,
  (h,a,s) => `🔥 Colleagues by day. Rivals today. ${s}.`,
  (h,a,s) => `💀 One team advances. One team packs up. ${s}.`,
  (h,a,s) => `⚔️ ${h} vs ${a}. One survives. One doesn't.`,
  (h,a,s) => `🤝 Shake hands before kick-off. Then absolutely don't.`,
  (h,a,s) => `😤 Settle it on the pitch. Sort it out in the office on Monday.`,
  (h,a,s) => `🏆 The syndicate divides here. ${s} showdown.`,
  (h,a,s) => `💸 No money, but the bragging rights are priceless.`,
  (h,a,s) => `🎲 Fate has drawn them together. ${s}.`,
  (h,a,s) => `📣 Office bulletin: ${s} clash incoming. Tensions rising.`,
  (h,a,s) => `🙏 May the best team win. Just not your colleague's.`,
  (h,a,s) => `🫠 Someone's going home. Someone else is going to brag about it forever.`,
  (h,a,s) => `⏱️ 90 minutes to decide who's still talking to whom on Monday.`,
  (h,a,s) => `🪑 One of these teams sits down. ${s} decides which.`,
  (h,a,s) => `🌡️ Office atmosphere post-match: depends entirely on this result.`,
  (h,a,s) => `👀 Everyone in the syndicate is watching this one carefully.`,
  (h,a,s) => `🎰 Winner takes the glory. Loser buys the coffees.`,
  (h,a,s) => `🫶 Good luck to both. (We don't mean it.)`,
  (h,a,s) => `📍 ${s} — this is where the syndicate story gets interesting.`,
  (h,a,s) => `🧊 Ice cold: one team's World Cup dreams end right here.`,
  (h,a,s) => `🎭 Drama incoming. Someone in this office is about to have a bad day.`,
  (h,a,s) => `🌍 Of all the teams in all the world, they had to play each other.`,
  (h,a,s) => `🔔 ${s} — ding ding. Let's go.`,
];
const CLASH_HYPE_STAGES = {
  LAST_32: 'Round of 32', LAST_16: 'Round of 16',
  QUARTER_FINALS: 'Quarter-Final', SEMI_FINALS: 'Semi-Final',
  THIRD_PLACE: '3rd Place', FINAL: 'THE FINAL',
};

function clashHype(m, hEntry, aEntry, usedIdx) {
  const stage = CLASH_HYPE_STAGES[m.stage] || 'Knockout';
  const hPeople = hEntry.people.join(' & ');
  const aPeople = aEntry.people.join(' & ');
  const live = m.status==='IN_PLAY'||m.status==='PAUSED';
  const done = m.status==='FINISHED';

  if (live) return { cls:'live', text:`🔴 IT'S HAPPENING RIGHT NOW — the office is divided!` };
  if (done) {
    if (m.winner==='HOME_TEAM') return { cls:'done-win', text:`✅ ${hPeople} — still in it! 💀 ${aPeople} — that's it, it's over.` };
    if (m.winner==='AWAY_TEAM') return { cls:'done-win', text:`✅ ${aPeople} — still in it! 💀 ${hPeople} — that's it, it's over.` };
    return { cls:'done-loss', text:`😤 Couldn't be separated — extra time/penalties decided a ${stage} derby.` };
  }

  // Deterministic pick with no repeats across the list
  const seed = [...(m.espnId||m.utcDate||'0')].reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0,0);
  const available = CLASH_HYPE_UPCOMING.map((_,i)=>i).filter(i=>!usedIdx.has(i));
  const pool = available.length ? available : CLASH_HYPE_UPCOMING.map((_,i)=>i);
  const idx = pool[Math.abs(seed) % pool.length];
  usedIdx.add(idx);
  return { cls:'upcoming', text: CLASH_HYPE_UPCOMING[idx](hPeople, aPeople, stage) };
}

function renderClashes(st) {
  const clashes=[], seen=new Set();
  for (const m of st.allMatches) {
    if (m.stage==='GROUP_STAGE') continue;
    const h=norm(m.home), a=norm(m.away);
    if (!SYND_TEAMS.has(h)||!SYND_TEAMS.has(a)) continue;
    const key=`${m.utcDate}|${h}|${a}`;
    if (seen.has(key)) continue; seen.add(key);
    clashes.push({...m,_h:h,_a:a});
  }
  clashes.sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));

  if (!clashes.length) {
    const alive=SYNDICATE.filter(s=>!resolveStatus(s.team,st).code.startsWith('OUT_')).length;
    document.getElementById('content').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">⚔️</div>
        <div class="empty-title">No syndicate clashes yet</div>
        <div class="empty-sub">When two syndicate teams are drawn against each other in the knockout rounds, the office drama will appear here.</div>
        <div class="empty-sub" style="margin-top:12px;color:#3b8fd4">${alive} of ${SYNDICATE.length} teams still in — the more that survive, the more likely a clash.</div>
      </div>`; return;
  }

  const makeClash = (m, usedIdx) => {
    const hs=TEAM_MAP[m._h], as=TEAM_MAP[m._a];
    const live=m.status==='IN_PLAY'||m.status==='PAUSED', done=m.status==='FINISHED';
    const hype = clashHype(m, hs, as, usedIdx);
    const stageLabel = CLASH_HYPE_STAGES[m.stage] || m.stage;

    const scoreHtml = done
      ?`<div class="clash-score">${m.homeScore}–${m.awayScore}</div><div class="clash-date">${fmtDate(m.utcDate)}</div>`
      :live?`<div class="clash-score live">${m.homeScore}–${m.awayScore}</div><div class="clash-date">🔴 LIVE</div>`
      :`<div class="clash-score" style="font-size:.9rem;color:#7a9ab0">vs</div><div class="clash-date">${fmtDT(m.utcDate)}</div>`;

    return `<div class="clash-card">
      <div class="clash-hype ${hype.cls}">${hype.text}</div>
      <div class="clash-header">
        <div class="clash-team">${teamCrest(m._h,'crest')}<div class="clash-name">${m._h}</div></div>
        <div class="clash-score-box">${scoreHtml}</div>
        <div class="clash-team right">${teamCrest(m._a,'crest')}<div class="clash-name">${m._a}</div></div>
      </div>
      <div class="clash-body">
        <div class="clash-people">
          <div class="clash-col">${hs.people.map(p=>`• ${p}`).join('<br>')}</div>
          <div class="clash-col right">${as.people.map(p=>`${p} •`).join('<br>')}</div>
        </div>
        <div class="clash-stage">${stageLabel}</div>
      </div></div>`;
  };

  document.getElementById('content').innerHTML=
    `<div class="sec-hdr">⚔️ Syndicate Clashes — ${clashes.length} match${clashes.length!==1?'es':''}</div>`+
    (() => { const u=new Set(); return clashes.map(m=>makeClash(m,u)).join(''); })();
}

function showAllTeams() {

function renderAllTeams(st) {
  const isOut=e=>e.status.code.startsWith('OUT_');
  const entries=SYNDICATE.map(s=>({...s,status:resolveStatus(s.team,st)}));
  entries.sort((a,b)=>(SORT_ORDER[a.status.code]??99)-(SORT_ORDER[b.status.code]??99));

  const makeRow = e => {
    const sc=(lastScorers[e.team]||[]).slice(0,3);
    const scStr=sc.length ? sc.map(s=>`${s.player} ${s.goals}g`).join(' · ') : '';
    const gr=st.groupRanks[e.team];
    const grPts=gr?`<span style="font-size:.65rem;color:#7a9ab0;margin-top:2px;display:block">${gr.pts}pts in group</span>`:'';
    return `
      <div class="at-row${isOut(e)?' eliminated':''}" onclick="showModal('${escQ(e.team)}')">
        <div>${teamCrest(e.team)}</div>
        <div class="at-info">
          <div class="at-name">${e.team}</div>
          <div class="at-colleagues">${e.people.join(' · ')}</div>
          ${scStr?`<div class="at-scorers">⚽ ${scStr}</div>`:''}
        </div>
        <div style="text-align:right"><div class="badge ${e.status.badge}">${e.status.label}</div>${grPts}</div>
      </div>`;
  };

  const inL=entries.filter(e=>!isOut(e)), outL=entries.filter(isOut);
  let html='';
  if(inL.length)  html+=`<div class="sec-hdr">🟢 Still In — ${inL.length}</div>`+inL.map(makeRow).join('');
  if(outL.length) html+=`<div class="sec-hdr">❌ Eliminated — ${outL.length}</div>`+outL.map(makeRow).join('');
  document.getElementById('content').innerHTML=html;
}

function showModal(team) {
  if (!lastState) return;

  const status = resolveStatus(team, lastState);

  document.getElementById('m-name').textContent = team;

  // ── OVERVIEW ────────────────────────────────────────────────────────────────

  const code=status.code;
  const sr={CHAMPION:5,OUT_FINAL:5,IN_SEMI:5,OUT_SEMI:4,OUT_3RD:4,IN_QUARTER:4,OUT_QUARTER:3,IN_R16:3,OUT_R16:2,IN_R32:2,OUT_R32:1,QUALIFIED:1,GROUP:0,TBD:0,OUT_GROUP:-1,UNKNOWN:-1}[code]??0;
  const isElim=code.startsWith('OUT_');
  const items=[];
  STAGE_LIST.forEach((stage,i)=>{
    const reached=i<=sr, current=i===sr&&!isElim, elimHere=isElim&&i===sr;

    const lc=i<sr?'done':'future';
    if(i>0) items.push(`<div class="ps-line ${lc}"></div>`);

  // Stats
  const ms=(lastState.matchesByTeam[team]||[]).filter(m=>m.status==='FINISHED');
  let gf=0,ga=0,w=0,d=0,l=0;
  for (const m of ms) {
    if(m._h===team){gf+=m.homeScore;ga+=m.awayScore;}else{gf+=m.awayScore;ga+=m.homeScore;}
    const ic=matchIcon(m,team); if(ic==='✅')w++;else if(ic==='❌')l++;else d++;

  const gd=gf-ga;

    <div class="stat-box"><div class="stat-box-num">${d}</div><div class="stat-box-lbl">Drawn</div></div>
    <div class="stat-box"><div class="stat-box-num">${l}</div><div class="stat-box-lbl">Lost</div></div>
    <div class="stat-box"><div class="stat-box-num">${gf}</div><div class="stat-box-lbl">GF</div></div>
    <div class="stat-box"><div class="stat-box-num">${ga}</div><div class="stat-box-lbl">GA</div></div>
    <div class="stat-box"><div class="stat-box-num ${gd>=0?'pos-num':'neg-num'}">${gd>=0?'+':''}${gd}</div><div class="stat-box-lbl">GD</div></div>`;

  // Scorers
  const sc=(lastScorers[team]||[]);

  if (sc.length) {
    document.getElementById('m-scorers-table').innerHTML=

      sc.map(x=>`<tr><td>${x.player}</td><td class="sc-goals">${x.goals}</td><td class="sc-assists">${x.assists||0}</td></tr>`).join('');

  } else { scsec.style.display='none'; scdiv.style.display='none'; }
  // Next fixture
  const upcoming=(lastState.matchesByTeam[team]||[]).find(m=>m.status==='SCHEDULED'||m.status==='TIMED');
  const nsec=document.getElementById('m-next-sec'), ndiv=document.getElementById('m-next-div');

  document.getElementById('m-colleagues').innerHTML=s.people.map(p=>`• ${p}`).join('<br>');

  // ── MATCHES TAB ─────────────────────────────────────────────────────────────
  const allMs=(lastState.matchesByTeam[team]||[]);
  const matchHtml = allMs.length ? allMs.map(m=>{
    const opp=m._h===team?m._a:m._h;
    const stageLbl=m.stage==='GROUP_STAGE'?`Group ${(m.group||'').replace('GROUP_','')}`:(KO_SHORT[m.stage]||m.stage);
    const teamColor_ = lastTeams[team]?.color||'#27ae60';
    const oppColor   = lastTeams[opp]?.color||'#4a6a80';

    // Events for this match
    const goals  = (m.events||[]).filter(e=>e.type==='goal');
    const reds   = (m.events||[]).filter(e=>e.type==='redcard');
    const teamGoals = goals.filter(e=>norm(e.team)===team);
    const oppGoals  = goals.filter(e=>norm(e.team)===opp);
    const evHtml = (m.status==='FINISHED'&&goals.length) ? `
      <div class="event-list">
        ${goals.map(e=>{
          const isTeam=norm(e.team)===team;
          const type=e.ownGoal?' (OG)':e.penalty?' (pen)':e.header?' (hdr)':'';
          return `<div class="event-row">
            <span class="ev-min">${e.minute}</span>
            <span class="ev-icon">⚽</span>
            <span class="ev-player">${e.player}${type}</span>
            <span class="ev-team-dot" style="background:${isTeam?teamColor_:oppColor}"></span>
          </div>`;
        }).join('')}
        ${reds.map(e=>{
          const isTeam=norm(e.team)===team;
          return `<div class="event-row">
            <span class="ev-min">${e.minute}</span>
            <span class="ev-icon">🟥</span>

      </div>

    return `<div class="modal-match">
      <span class="mm-date">${fmtDate(m.utcDate)}</span>
      <div class="mm-body">
        <div class="mm-matchup">
          ${teamCrest(opp,'crest-sm')} <span>vs ${opp}</span>

    </div>`;
  }).join('') : '<div style="color:rgba(255,255,255,.3);font-size:.8rem;padding:8px 0">No fixtures yet</div>';
  document.getElementById('m-matches').innerHTML=matchHtml;

  // ── SQUAD TAB ───────────────────────────────────────────────────────────────

}

function renderMatchCentre(st) {
  const now=Date.now();
  const live    =st.allMatches.filter(m=>m.status==='IN_PLAY'||m.status==='PAUSED');
  const recent  =st.allMatches.filter(m=>m.status==='FINISHED'&&now-new Date(m.utcDate).getTime()<3*60*60*1000);
  const upcoming=st.allMatches.filter(m=>{
    const t=new Date(m.utcDate).getTime();
    return (m.status==='SCHEDULED'||m.status==='TIMED')&&t>now&&t-now<10*60*60*1000;
  }).sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));

  const makeCard=m=>{
    const h=norm(m.home),a=norm(m.away);
    const hE=TEAM_MAP[h],aE=TEAM_MAP[a];
    const hC=lastTeams[h]?.color||'#2ecc71', aC=lastTeams[a]?.color||'#3b8fd4';
    const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
    const isDone=m.status==='FINISHED';
    const stageLbl=m.stage==='GROUP_STAGE'?`Group ${(m.group||'').replace('GROUP_','')}`:(KO_SHORT[m.stage]||m.stage);
    const badge=isLive?`<span class="live-badge-big">🔴 LIVE</span>`:isDone?`<span class="finished-badge">FT</span>`:`<span class="upcoming-badge">${fmtTime(m.utcDate)} UTC</span>`;
    const scoreHtml=!isDone&&!isLive
      ?`<div style="font-size:.9rem;color:rgba(255,255,255,.22);font-weight:600">vs</div>`
      :`<div class="live-score${isLive?' is-live':''}">${m.homeScore}<span class="live-score-sep"> – </span>${m.awayScore}</div>`;
    const goals=(m.events||[]).filter(e=>e.type==='goal');
    const reds=(m.events||[]).filter(e=>e.type==='redcard');
    const evs=[...goals,...reds].sort((a,b)=>(parseInt(a.minute)||0)-(parseInt(b.minute)||0));
    const evHtml=evs.length?`<div class="live-events">${evs.map(e=>{
      const isH=norm(e.team)===h;
      return `<div class="live-ev"><span class="live-ev-min">${e.minute}</span><span class="live-ev-icon">${e.type==='redcard'?'🟥':e.ownGoal?'⚽':e.penalty?'⚽':'⚽'}</span><span class="live-ev-player">${e.player}${e.ownGoal?' (og)':e.penalty?' (pen)':''}</span><span class="live-ev-dot" style="background:${isH?hC:aC}"></span></div>`;
    }).join('')}</div>`:'';
    const mst=m.stats||{},hst=mst[h],ast=mst[a];
    const statsHtml=(isDone||isLive)&&hst?`<div class="live-stats">
      <div class="live-poss-lbl"><span style="color:${hC}">${hst.possession}%</span><span>Possession</span><span style="color:${aC}">${ast?.possession||0}%</span></div>
      <div class="live-poss-bar"><div class="live-poss-fill" style="width:${hst.possession}%;background:${hC}"></div></div>
      <div class="live-stat-r"><span class="lsv">${hst.shots}</span><span class="lsl">Shots</span><span class="lsv r">${ast?.shots||0}</span></div>
      <div class="live-stat-r"><span class="lsv">${hst.shotsOnTarget}</span><span class="lsl">On Target</span><span class="lsv r">${ast?.shotsOnTarget||0}</span></div>
      ${m.attendance?`<div class="live-stat-r" style="margin-top:2px"><span class="lsl" style="text-align:left;color:rgba(255,255,255,.28)">👥 ${m.attendance.toLocaleString()}</span></div>`:''}
    </div>`:m.attendance&&isDone?`<div class="live-stats"><div class="live-stat-r"><span class="lsl" style="text-align:left;color:rgba(255,255,255,.28)">👥 ${m.attendance.toLocaleString()}</span></div></div>`:'';
    return `<div class="live-card${isLive?' is-live':''}">
      <div class="live-card-hdr"><span>${stageLbl}${m.venue?' · '+m.venue:''}</span>${badge}</div>
      <div class="live-score-row">
        <div class="live-team" onclick="showModal('${escQ(h)}')">
          ${teamCrest(h,'crest')}<div class="live-team-name">${h}</div>
          ${hE?`<div class="live-colleagues">${hE.people.join(', ')}</div>`:''}
        </div>
        <div class="live-score-box">${scoreHtml}${isDone&&m.headline?`<div style="font-size:.58rem;color:rgba(255,255,255,.25);margin-top:6px;text-align:center;max-width:110px;line-height:1.3">${m.headline}</div>`:''}</div>
        <div class="live-team" onclick="showModal('${escQ(a)}')">
          ${teamCrest(a,'crest')}<div class="live-team-name">${a}</div>
          ${aE?`<div class="live-colleagues">${aE.people.join(', ')}</div>`:''}
        </div>
      </div>
      ${evHtml}${statsHtml}
    </div>`;
  };

  let html='';
  if(live.length)    { html+=`<div class="sec-hdr">🔴 Live Now — ${live.length} match${live.length!==1?'es':''}</div>`+live.map(makeCard).join(''); }
  if(upcoming.length){ html+=`<div class="sec-hdr">📅 Coming Up</div>`+upcoming.slice(0,6).map(makeCard).join(''); }
  if(recent.length)  { html+=`<div class="sec-hdr">✅ Recent Results</div>`+recent.slice(0,8).map(makeCard).join(''); }
  if(!html) html=`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">No matches right now</div><div class="empty-sub">Check back when games are scheduled.</div></div>`;
  document.getElementById('content').innerHTML=html;
}

    b.innerHTML=`📅 Next: <strong>${h?.flag||''} ${norm(next.home)} vs ${norm(next.away)} ${a?.flag||''}</strong> — ${fmtDT(next.utcDate)} · tap for schedule`;
    b.style.display='block';
  } else { b.style.display='none'; }
}

function renderStats(st) {
  const codes=SYNDICATE.map(s=>resolveStatus(s.team,st).code);
  document.getElementById('sn-all').textContent=SYNDICATE.length;
  document.getElementById('sn-in').textContent=codes.filter(c=>!c.startsWith('OUT_')&&c!=='TBD').length;
  document.getElementById('sn-tbd').textContent=codes.filter(c=>c==='TBD').length;
  document.getElementById('sn-out').textContent=codes.filter(c=>c.startsWith('OUT_')).length;
  document.getElementById('live-label').innerHTML=st.liveCount>0?`Auto-updating <span class="live-pill">LIVE</span>`:'Auto-updating';

  // Tournament progress bar
  const total    = st.allMatches.length;
  const finished = st.allMatches.filter(m=>m.status==='FINISHED').length;
  const live     = st.liveCount;
  if (total > 0) {
    const pct = Math.round((finished / total) * 100);
    document.getElementById('pb-fill').style.width = pct + '%';
    document.getElementById('pb-pct').textContent  = pct + '%';
    document.getElementById('pb-label').textContent = `${finished}${live?` + ${live} live`:''} of ${total} matches played`;
    document.getElementById('progress-bar-wrap').style.display = '';
  }
}

// ── ESPN DIRECT PARSER ────────────────────────────────────────────────────────
// Converts raw ESPN scoreboard JSON → our matches array format.
// Same logic as fetch_data.py but in the browser — no server delay.
function parseESPN(data) {
  const matches=[], newTeams={};
  for (const ev of data.events||[]) {
    const comp=ev.competitions?.[0]; if(!comp) continue;
    const comps=comp.competitors||[]; if(comps.length<2) continue;
    const homeC=comps.find(c=>c.homeAway==='home')||comps[0];
    const awayC=comps.find(c=>c.homeAway==='away')||comps[1];
    const home=norm(homeC.team?.displayName||'');
    const away=norm(awayC.team?.displayName||'');

    // Team metadata — crests, colours, form
    for (const [c,t] of [[homeC,home],[awayC,away]]) {
      if (t && !newTeams[t]) {
        const td=c.team||{};
        newTeams[t]={
          id:td.id, abbr:(td.abbreviation||'').toLowerCase(),
          color:'#'+(td.color||'1a3050'), altColor:'#'+(td.alternateColor||'e8edf5'),
          logo:td.logo||'', form:c.form||'',
        };
      } else if (t && newTeams[t] && c.form) {
        newTeams[t].form=c.form; // keep most recent form
      }
    }

    const st=comp.status?.type||{};
    const state=st.state||'pre';
    const status=state==='post'?'FINISHED':state==='in'?'IN_PLAY':'SCHEDULED';
    let homeScore=null,awayScore=null;
    if (state!=='pre'){homeScore=parseInt(homeC.score||0);awayScore=parseInt(awayC.score||0);}
    let winner=null;
    if (state==='post'){
      if(homeC.winner) winner='HOME_TEAM';
      else if(awayC.winner) winner='AWAY_TEAM';
      else if(homeScore===awayScore) winner='DRAW';
    }

    const slug=ev.season?.slug||'group-stage';
    const stage=SLUG_TO_STAGE[slug]||'GROUP_STAGE';
    let group=null;
    const alt=comp.altGameNote||'';
    if(alt.includes('Group')&&stage==='GROUP_STAGE'){
      const l=alt.split('Group ').pop().trim();
      if(l.length===1) group='GROUP_'+l;
    }

    const idToName={};
    for(const c of comps) idToName[c.team?.id]=norm(c.team?.displayName||'');

    const events=[];
    for(const d of comp.details||[]){
      const isGoal=d.scoringPlay,isRed=d.redCard,isYellow=d.yellowCard;
      if(!isGoal&&!isRed&&!isYellow) continue;
      const aths=d.athletesInvolved||[];
      events.push({
        type:isGoal?'goal':isRed?'redcard':'yellowcard',
        team:idToName[d.team?.id]||'',
        player:aths[0]?.displayName||'',
        minute:d.clock?.displayValue||'',
        header:(d.type?.text||'').includes('Header'),
        penalty:d.penaltyKick||false,
        ownGoal:d.ownGoal||false,
      });
    }

    const stats={};
    for(const [c,t] of [[homeC,home],[awayC,away]]){
      const raw={};
      for(const s of c.statistics||[]) raw[s.abbreviation]=s.displayValue||'0';
      if(Object.keys(raw).length) stats[t]={
        possession:parseFloat(raw.PP||0),shots:parseInt(raw.SHOT||0),
        shotsOnTarget:parseInt(raw.SOG||0),corners:parseInt(raw.CW||0),
      };
    }

    let headline='';
    for(const hl of comp.headlines||[])
      if(hl.type==='Recap'||hl.type==='GameSummary'){headline=hl.shortLinkText||hl.description||'';break;}

    matches.push({
      utcDate:ev.date,status,stage,group,home,away,homeScore,awayScore,winner,
      venue:comp.venue?.fullName||'',attendance:comp.attendance,
      events,stats,headline,espnId:ev.id||'',
    });
  }
  return {matches,teams:newTeams};
}

// ── FETCH & UPDATE ────────────────────────────────────────────────────────────
let refreshTimer    = null;
let metaFetchedAt   = 0;
const META_TTL      = 15 * 60 * 1000;  // refresh scorers/metadata every 15 min
const LIVE_POLL     = 30 * 1000;       // 30s when a match is live
const IDLE_POLL     = 5  * 60 * 1000; // 5 min when nothing is live
let espnDirect      = true;            // start optimistic; flip to false if CORS blocked

async function fetchMetadata() {
  try {
    const res=await fetch(`${DATA_URL}?_=${Date.now()}`);
    if(!res.ok) return;
    const data=await res.json();
    // Scorers
    lastScorers={};
    for(const s of data.scorers||[]){
      const t=norm(s.team);
      if(!lastScorers[t]) lastScorers[t]=[];
      lastScorers[t].push(s);
    }
    // Teams — seed if ESPN hasn't populated yet
    for(const [raw,meta] of Object.entries(data.teams||{})){
      const t=norm(raw);
      if(!lastTeams[t]) lastTeams[t]=meta;
    }
    metaFetchedAt=Date.now();
  } catch(e){ console.warn('[wc2026] metadata fetch failed:',e.message); }
}

async function fetchMatches() {
  // ── Try ESPN directly first ────────────────────────────────────────────────
  if(espnDirect){
    try{
      const res=await fetch(`${ESPN_URL}`);
      if(!res.ok) throw new Error('ESPN '+res.status);
      const data=await res.json();
      const {matches,teams}=parseESPN(data);
      // Merge fresher team data (crests, form, colours)
      for(const [t,meta] of Object.entries(teams)) lastTeams[t]={...lastTeams[t],...meta};
      return matches;
    } catch(e){
      console.warn('[wc2026] ESPN direct blocked, falling back to data.json:',e.message);
      espnDirect=false; // stop trying ESPN, use data.json from now on
    }
  }
  // ── Fallback: data.json (updated by GitHub Action) ─────────────────────────
  const res=await fetch(`${DATA_URL}?_=${Date.now()}`);
  if(!res.ok) throw new Error(`data.json unavailable (${res.status})`);
  const data=await res.json();
  return data.matches||[];
}

async function update() {
  clearTimeout(refreshTimer);
  try{
    // Refresh scorers/metadata from data.json periodically
    if(Date.now()-metaFetchedAt>META_TTL) await fetchMetadata();

    const matches=await fetchMatches();
    if(!Array.isArray(matches)) throw new Error('No match data received.');

    lastState=processMatches(matches);
    renderStats(lastState);
    renderBanner(lastState);
    renderCurrentTab();

    const src=espnDirect?'ESPN ⚡':'data.json';
    document.getElementById('last-updated').textContent=
      'Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' ('+src+')';
    document.getElementById('error-msg').style.display='none';
  } catch(err){
    const el=document.getElementById('error-msg');
    el.style.display='block'; el.textContent='⚠️ '+err.message;
    document.getElementById('last-updated').textContent='Update failed';
    console.error('[wc2026]',err);
  }
  // Adaptive: faster when live
  const next=lastState?.liveCount>0 ? LIVE_POLL : IDLE_POLL;
  refreshTimer=setTimeout(update,next);
}

// Load squads (non-blocking, optional)
async function loadSquads() {
  try{
    const res=await fetch(`${SQUADS_URL}?_=${Date.now()}`);
    if(!res.ok) return;
    const data=await res.json();
    lastSquads={};
    for(const [raw,squad] of Object.entries(data.squads||{})) lastSquads[norm(raw)]=squad;
    console.log(`[wc2026] Loaded squads for ${Object.keys(lastSquads).length} teams`);
  } catch(e){ /* squads.json not available yet */ }
}

// Boot
fetchMetadata().then(update);
loadSquads();

</script>
